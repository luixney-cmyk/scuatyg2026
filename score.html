<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Posiciones - SC UATyG 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #5c94fc; /* Mario Sky Blue */
            background-image: 
                linear-gradient(transparent 95%, rgba(255, 255, 255, 0.2) 95%),
                linear-gradient(90deg, transparent 95%, rgba(255, 255, 255, 0.2) 95%);
            background-size: 20px 20px;
        }
        
        .font-pixel {
            font-family: 'Press Start 2P', cursive;
        }

        .nes-container {
            border: 4px solid black;
            padding: 1.5rem;
            position: relative;
            background: white;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }

        /* Estilo de la tabla (Rainbow Road / Pista) */
        .leaderboard-bg {
            background-color: #1a1a24;
            background-image: 
                radial-gradient(circle at 50% 0%, #3a3a5c 0%, transparent 70%),
                linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            border: 6px solid #b83618;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,1),
                10px 10px 0px rgba(0,0,0,0.5);
        }

        .row-hover {
            transition: all 0.2s;
        }
        .row-hover:hover {
            transform: scale(1.02) translateX(10px);
            background-color: rgba(255,255,255,0.1);
        }

        .rank-text {
            -webkit-text-stroke: 2px black;
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .blink {
            animation: blinker 1.5s ease-in-out infinite;
        }

        @keyframes blinker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; } 
        }

        /* Modal Detalles de Equipo */
        .modal-zoom {
            animation: zoomIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 pb-24 relative overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-red-600 border-b-4 border-black p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity no-underline">
                <div class="w-8 h-8 bg-white border-2 border-black rounded-full flex items-center justify-center font-bold text-black">M</div>
                <span class="text-white font-pixel text-xs md:text-sm">SC UATyG 2026</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-white font-pixel text-[10px] md:text-xs hover:text-yellow-300 transition-colors flex items-center gap-1">
                    <i data-lucide="home" class="w-4 h-4"></i> INICIO
                </a>
            </div>
        </div>
    </nav>

    <!-- Header / Título -->
    <header class="container mx-auto mt-8 px-4 text-center">
        <h2 class="text-red-600 font-pixel text-lg md:text-2xl mb-2 floating drop-shadow-[2px_2px_0_rgba(255,255,255,1)]">RACE RESULTS</h2>
        <h1 class="text-4xl md:text-6xl font-black mb-4 uppercase tracking-tighter drop-shadow-md">TABLA DE POSICIONES</h1>
        <p class="text-lg md:text-xl font-bold mb-6">¡Descubre qué equipo domina el Reino Champiñón!</p>
    </header>

    <!-- Leaderboard Container -->
    <main class="container mx-auto px-4 max-w-4xl relative z-10">
        
        <div class="leaderboard-bg rounded-lg p-4 md:p-8">
            <!-- Títulos de columna -->
            <div class="flex text-gray-400 font-pixel text-[8px] md:text-xs mb-4 px-2 border-b-2 border-gray-600 pb-2">
                <div class="w-16 md:w-24 text-center">POS</div>
                <div class="flex-1 text-left pl-4">EQUIPO / PERSONAJE</div>
                <div class="w-20 md:w-32 text-right">PUNTOS</div>
            </div>

            <!-- Aquí se inyectan las filas con JavaScript -->
            <div id="leaderboard-container" class="space-y-3">
                <!-- El contenido se generará automáticamente -->
            </div>
        </div>

    </main>

    <!-- Modal de Detalles de Misiones -->
    <div id="team-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="modal-zoom bg-white border-4 border-black w-full max-w-md rounded-lg shadow-[8px_8px_0_rgba(0,0,0,1)] flex flex-col max-h-[90vh]">
            <!-- Header del modal -->
            <div id="modal-header" class="p-4 border-b-4 border-black flex items-center gap-4 relative">
                <button onclick="closeTeamDetails()" class="absolute top-2 right-2 w-8 h-8 bg-red-600 text-white border-2 border-black rounded flex items-center justify-center font-bold hover:bg-red-700 transition-colors">X</button>
                <div id="modal-avatar" class="w-12 h-12 border-2 border-black rounded flex items-center justify-center shadow-[2px_2px_0_rgba(0,0,0,1)] bg-white text-black">
                    <span id="modal-initials" class="font-pixel text-[10px]"></span>
                </div>
                <div>
                    <h3 id="modal-team-name" class="font-bold text-2xl uppercase tracking-wider"></h3>
                    <p id="modal-team-points" class="font-pixel text-[10px]"></p>
                </div>
            </div>
            <!-- Cuerpo del modal (Misiones) -->
            <div class="p-4 overflow-y-auto bg-gray-50 flex-1 rounded-b-lg">
                <h4 class="font-pixel text-xs text-blue-600 mb-4 border-b-2 border-blue-200 pb-2">MISIONES GANADAS</h4>
                <ul id="modal-missions-list" class="space-y-3">
                    <!-- Las misiones se inyectan aquí con JavaScript -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- SISTEMA DE AUDIO (Sonido de Moneda) ---
        let audioCtx;
        function playCoinSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square'; 
            
            osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); // Nota B5
            osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.1); // Nota E6

            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); 

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // ==========================================
        // BASE DE DATOS DE EQUIPOS (Edita los puntos y misiones aquí)
        // ==========================================
        const teams = [
            // Dejé a Mario con un par de misiones de ejemplo para que veas cómo se llena.
            { name: "Mario", points: 0, color: "bg-red-600", border: "border-red-800", text: "text-white", missions: [ { title: "Presentación de Equipos ", place: 1 }, { title: "Grand Prix", place: 2 } ] },
            { name: "Luigi", points: 0, color: "bg-green-600", border: "border-green-800", text: "text-white", missions: [] },
            { name: "Peach", points: 0, color: "bg-pink-400", border: "border-pink-600", text: "text-white", missions: [] },
            { name: "Daisy", points: 0, color: "bg-orange-400", border: "border-orange-600", text: "text-white", missions: [] },
            { name: "Yoshi", points: 0, color: "bg-lime-400", border: "border-lime-600", text: "text-black", missions: [] },
            { name: "Toad", points: 0, color: "bg-gray-100", border: "border-gray-400", text: "text-black", missions: [] },
            { name: "Wario", points: 0, color: "bg-yellow-400", border: "border-yellow-600", text: "text-black", missions: [] },
            { name: "Waluigi", points: 0, color: "bg-purple-600", border: "border-purple-800", text: "text-white", missions: [] },
            { name: "Bowser", points: 0, color: "bg-red-900", border: "border-red-950", text: "text-white", missions: [] },
            { name: "DK", points: 0, color: "bg-amber-800", border: "border-amber-950", text: "text-white", missions: [] },
            { name: "Rosalina", points: 0, color: "bg-teal-300", border: "border-teal-500", text: "text-black", missions: [] },
            { name: "Koopa", points: 0, color: "bg-gray-800", border: "border-black", text: "text-white", missions: [] },
            { name: "Birdo", points: 0, color: "bg-pink-600", border: "border-pink-800", text: "text-white", missions: [] },
            { name: "Boo", points: 0, color: "bg-blue-100", border: "border-blue-300", text: "text-black", missions: [] },
            { name: "Shy Guy", points: 0, color: "bg-blue-900", border: "border-blue-950", text: "text-white", missions: [] },
            { name: "Huesitos", points: 0, color: "bg-gray-500", border: "border-gray-700", text: "text-white", missions: [] }
        ];

        // 1. ORDENAR LOS EQUIPOS DE MAYOR A MENOR PUNTAJE
        teams.sort((a, b) => b.points - a.points);

        const container = document.getElementById('leaderboard-container');

        // 2. GENERAR LA TABLA VISUALMENTE
        teams.forEach((team, index) => {
            const rank = index + 1;
            
            // Asignar colores según la posición
            let rankColor = "text-orange-500"; 
            let suffix = "th";
            
            if (rank === 1) { rankColor = "text-yellow-400"; suffix = "st"; }
            else if (rank === 2) { rankColor = "text-gray-300"; suffix = "nd"; }
            else if (rank === 3) { rankColor = "text-amber-600"; suffix = "rd"; }

            // Crear el elemento de la fila
            const row = document.createElement('div');
            row.className = "flex items-center p-2 rounded row-hover border-b border-gray-700/50 cursor-pointer";
            
            row.innerHTML = `
                <!-- POSICIÓN -->
                <div class="w-16 md:w-24 text-center font-pixel text-2xl md:text-4xl ${rankColor} rank-text italic pr-2">
                    ${rank}<span class="text-sm md:text-lg">${suffix}</span>
                </div>

                <!-- AVATAR Y NOMBRE -->
                <div class="flex-1 flex items-center gap-3 md:gap-4 pl-2 md:pl-4">
                    <div class="w-12 h-12 md:w-16 md:h-16 ${team.color} ${team.border} border-4 rounded-lg flex items-center justify-center shadow-[4px_4px_0_rgba(0,0,0,1)] transform -rotate-3">
                        <span class="font-pixel text-[8px] md:text-[10px] ${team.text}">${team.name.substring(0,3).toUpperCase()}</span>
                    </div>
                    <span class="font-bold text-white text-lg md:text-2xl uppercase tracking-wider drop-shadow-[2px_2px_0_rgba(0,0,0,1)]">${team.name}</span>
                </div>

                <!-- PUNTOS -->
                <div class="w-20 md:w-32 text-right">
                    <span class="font-pixel text-sm md:text-xl text-yellow-300 drop-shadow-[2px_2px_0_rgba(0,0,0,1)]">${team.points}</span>
                    <span class="block text-gray-400 text-[8px] md:text-[10px] uppercase font-bold mt-1">PTS</span>
                </div>
            `;

            // Reproducir el sonido al darle clic y abrir detalles de misiones
            row.addEventListener('click', () => {
                playCoinSound();
                showTeamDetails(team);
            });

            container.appendChild(row);
        });

        // --- LÓGICA DEL MODAL DE DETALLES DE MISIONES ---
        function showTeamDetails(team) {
            const header = document.getElementById('modal-header');
            const initials = document.getElementById('modal-initials');
            
            header.className = `p-4 border-b-4 border-black flex items-center gap-4 relative ${team.color}`;
            document.getElementById('modal-team-name').innerText = team.name;
            document.getElementById('modal-team-name').className = `font-bold text-2xl uppercase tracking-wider ${team.text || 'text-white'}`;
            document.getElementById('modal-team-points').innerText = `${team.points} PTS`;
            document.getElementById('modal-team-points').className = `font-pixel text-[10px] ${team.text === 'text-black' ? 'text-gray-800' : 'text-gray-200'}`;
            
            initials.innerText = team.name.substring(0,3).toUpperCase();

            const list = document.getElementById('modal-missions-list');
            list.innerHTML = ''; 

            if (!team.missions || team.missions.length === 0) {
                list.innerHTML = '<p class="text-sm text-gray-500 text-center py-4 italic">Aún no hay misiones ganadas registradas.</p>';
            } else {
                team.missions.forEach(mission => {
                    let medalIcon = '🏅';
                    let medalColor = 'bg-gray-200 text-gray-600 border-gray-300';
                    let placeText = `${mission.place}º Lugar`;

                    if (mission.place === 1) { medalIcon = '🥇'; medalColor = 'bg-yellow-100 text-yellow-700 border-yellow-400'; }
                    else if (mission.place === 2) { medalIcon = '🥈'; medalColor = 'bg-gray-100 text-gray-600 border-gray-400'; }
                    else if (mission.place === 3) { medalIcon = '🥉'; medalColor = 'bg-orange-100 text-orange-700 border-orange-400'; placeText = '3er Lugar'; }
                    else { medalColor = 'bg-blue-50 text-blue-600 border-blue-200'; placeText = 'Participación'; }

                    const li = document.createElement('li');
                    li.className = `flex items-center justify-between p-3 rounded border-2 ${medalColor} shadow-sm`;
                    li.innerHTML = `
                        <span class="font-bold text-sm md:text-base">${mission.title}</span>
                        <div class="flex items-center gap-2">
                            <span class="font-pixel text-[8px] uppercase">${placeText}</span>
                            <span class="text-xl md:text-2xl">${medalIcon}</span>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }

            document.getElementById('team-modal').classList.remove('hidden');
        }

        function closeTeamDetails() {
            document.getElementById('team-modal').classList.add('hidden');
        }

        document.getElementById('team-modal').addEventListener('click', (e) => {
            if (e.target.id === 'team-modal') closeTeamDetails();
        });

    </script>
</body>

</html>
