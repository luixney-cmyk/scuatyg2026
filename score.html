<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Posiciones - SC UATyG 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #5c94fc; /* Mario Sky Blue */
            background-image: 
                linear-gradient(transparent 95%, rgba(255, 255, 255, 0.2) 95%),
                linear-gradient(90deg, transparent 95%, rgba(255, 255, 255, 0.2) 95%);
            background-size: 20px 20px;
        }
        
        .font-pixel {
            font-family: 'Press Start 2P', cursive;
        }

        .nes-container {
            border: 4px solid black;
            padding: 1.5rem;
            position: relative;
            background: white;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }

        /* Estilo de la tabla (Rainbow Road / Pista) */
        .leaderboard-bg {
            background-color: #1a1a24;
            background-image: 
                radial-gradient(circle at 50% 0%, #3a3a5c 0%, transparent 70%),
                linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            border: 6px solid #b83618;
            box-shadow: 
                inset 0 0 20px rgba(0,0,0,1),
                10px 10px 0px rgba(0,0,0,0.5);
        }

        .row-hover {
            transition: all 0.2s;
        }
        .row-hover:hover {
            transform: scale(1.02) translateX(10px);
            background-color: rgba(255,255,255,0.1);
        }

        .rank-text {
            -webkit-text-stroke: 2px black;
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Modal Detalles de Equipo */
        .modal-zoom {
            animation: zoomIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        /* Animación de carga */
        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 pb-24 relative overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-red-600 border-b-4 border-black p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity no-underline">
                <div class="w-8 h-8 bg-white border-2 border-black rounded-full flex items-center justify-center font-bold text-black">M</div>
                <span class="text-white font-pixel text-xs md:text-sm">SC UATyG 2026</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-white font-pixel text-[10px] md:text-xs hover:text-yellow-300 transition-colors flex items-center gap-1">
                    <i data-lucide="home" class="w-4 h-4"></i> INICIO
                </a>
            </div>
        </div>
    </nav>

    <!-- Header / Título -->
    <header class="container mx-auto mt-8 px-4 text-center">
        <h2 class="text-red-600 font-pixel text-lg md:text-2xl mb-2 floating drop-shadow-[2px_2px_0_rgba(255,255,255,1)]">RACE RESULTS</h2>
        <h1 class="text-4xl md:text-6xl font-black mb-4 uppercase tracking-tighter drop-shadow-md">TABLA DE POSICIONES</h1>
        <p class="text-lg md:text-xl font-bold mb-6">¡Descubre qué equipo domina el Reino Champiñón!</p>
        
        <!-- Indicador de estado en vivo -->
        <div id="live-indicator" class="hidden mb-6 flex justify-center items-center gap-2 text-xs font-bold text-green-800 bg-green-200 border border-green-400 py-1 px-3 rounded-full w-max mx-auto shadow-sm">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            ACTUALIZACIÓN EN VIVO
        </div>
        <div id="offline-indicator" class="hidden mb-6 flex justify-center items-center gap-2 text-xs font-bold text-yellow-800 bg-yellow-200 border border-yellow-400 py-1 px-3 rounded-full w-max mx-auto shadow-sm">
            <i data-lucide="wifi-off" class="w-3 h-3"></i>
            MODO OFFLINE (Esperando conexión...)
        </div>
    </header>

    <!-- Leaderboard Container -->
    <main class="container mx-auto px-4 max-w-4xl relative z-10">
        
        <div class="leaderboard-bg rounded-lg p-4 md:p-8">
            <!-- Títulos de columna -->
            <div class="flex text-gray-400 font-pixel text-[8px] md:text-xs mb-4 px-2 border-b-2 border-gray-600 pb-2">
                <div class="w-16 md:w-24 text-center">POS</div>
                <div class="flex-1 text-left pl-4">EQUIPO / PERSONAJE</div>
                <div class="w-20 md:w-32 text-right">PUNTOS</div>
            </div>

            <!-- Pantalla de carga inicial -->
            <div id="loading-state" class="text-center py-10 loading-pulse">
                <i data-lucide="gamepad-2" class="w-12 h-12 text-yellow-400 mx-auto mb-4"></i>
                <p class="font-pixel text-white text-xs md:text-sm">CARGANDO DATOS DEL SERVIDOR...</p>
            </div>

            <!-- Aquí se inyectan las filas con JavaScript -->
            <div id="leaderboard-container" class="space-y-3 hidden">
                <!-- El contenido se generará automáticamente -->
            </div>
        </div>

    </main>

    <!-- Modal de Detalles de Misiones -->
    <div id="team-modal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="modal-zoom bg-white border-4 border-black w-full max-w-md rounded-lg shadow-[8px_8px_0_rgba(0,0,0,1)] flex flex-col max-h-[90vh]">
            <!-- Header del modal -->
            <div id="modal-header" class="p-4 border-b-4 border-black flex items-center gap-4 relative">
                <button onclick="closeTeamDetails()" class="absolute top-2 right-2 w-8 h-8 bg-red-600 text-white border-2 border-black rounded flex items-center justify-center font-bold hover:bg-red-700 transition-colors z-20">X</button>
                
                <!-- Avatar ahora con imagen -->
                <div id="modal-avatar" class="w-16 h-16 border-4 border-black rounded flex items-center justify-center shadow-[2px_2px_0_rgba(0,0,0,1)] bg-white text-black overflow-hidden relative z-10">
                    <img id="modal-img" src="" alt="Team Avatar" class="w-full h-full object-contain p-1 scale-110 drop-shadow-md">
                </div>

                <div class="z-10">
                    <h3 id="modal-team-name" class="font-bold text-2xl uppercase tracking-wider"></h3>
                    <p id="modal-team-points" class="font-pixel text-[10px]"></p>
                </div>
            </div>
            <!-- Cuerpo del modal (Misiones) -->
            <div class="p-4 overflow-y-auto bg-gray-50 flex-1 rounded-b-lg">
                <h4 class="font-pixel text-xs text-blue-600 mb-4 border-b-2 border-blue-200 pb-2">MISIONES REGISTRADAS</h4>
                <ul id="modal-missions-list" class="space-y-3">
                    <!-- Las misiones se inyectan aquí con JavaScript -->
                </ul>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    lucide.createIcons();

    // --- SISTEMA DE AUDIO ---
    let audioCtx;
    window.playCoinSound = function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.1); 
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); 
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    };

    // ==========================================
    // CONFIGURACIÓN DE FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyAWvlKYMuFlxL88OrSOzGPzXk0w_HUTGQ8",
        authDomain: "scuatyg2026.firebaseapp.com",
        projectId: "scuatyg2026",
        storageBucket: "scuatyg2026.firebasestorage.app",
        messagingSenderId: "321639282182",
        appId: "1:321639282182:web:6803746ad3ff4c8e8e3587",
        measurementId: "G-YQ5KBWYEQY"
    };

    const isCanvasEnv = typeof __firebase_config !== 'undefined';
    const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'scuatyg2026-app';
    const baseUrl = "https://raw.githubusercontent.com/luixney-cmyk/scuatyg2026/main/";

    // --- BASE DE DATOS DE EQUIPOS ---
    const baseTeamsInfo = [
        { name: "Mario", color: "bg-red-600", border: "border-red-800", text: "text-white", img: "mario.png" },
        { name: "Peach", color: "bg-pink-400", border: "border-pink-600", text: "text-white", img: "peach.png" },
        { name: "Waluigi", color: "bg-purple-600", border: "border-purple-800", text: "text-white", img: "raluigi.png" },
        { name: "Bowser", color: "bg-red-900", border: "border-red-950", text: "text-white", img: "bowser.png" },
        { name: "Rosalina", color: "bg-teal-300", border: "border-teal-500", text: "text-black", img: "Rosalina.png" },
        { name: "Koopa", color: "bg-gray-800", border: "border-black", text: "text-white", img: "koopa.png" },
        { name: "Boo", color: "bg-blue-100", border: "border-blue-300", text: "text-black", img: "boo.png" },
        { name: "Huesitos", color: "bg-gray-500", border: "border-gray-700", text: "text-white", img: "huesitos.png" }
    ];

    let db = null, auth = null;
    let globalTeamsData = []; 

    // --- FUNCIÓN PRINCIPAL PARA PROCESAR DATOS (Soporte para Empates) ---
    const procesarDatosDeNube = (registrosNube) => {
        let equiposProcesados = baseTeamsInfo.map(t => ({
            ...t, 
            points: 0, 
            missions: [] 
        }));

        registrosNube.forEach(registro => {
            // Helper para soportar bases de datos viejas (string) y nuevas (array de empates)
            const getMedalWinners = (val) => Array.isArray(val) ? val : (val ? [val] : []);

            const oros = getMedalWinners(registro.oro);
            const platas = getMedalWinners(registro.plata);
            const bronces = getMedalWinners(registro.bronce);

            oros.forEach(equipoNombre => {
                let eq = equiposProcesados.find(t => t.name === equipoNombre);
                if (eq) {
                    eq.points += (registro.ptsOro || 0);
                    eq.missions.push({ title: registro.titulo, place: 1, pts: registro.ptsOro });
                }
            });

            platas.forEach(equipoNombre => {
                let eq = equiposProcesados.find(t => t.name === equipoNombre);
                if (eq) {
                    eq.points += (registro.ptsPlata || 0);
                    eq.missions.push({ title: registro.titulo, place: 2, pts: registro.ptsPlata });
                }
            });

            bronces.forEach(equipoNombre => {
                let eq = equiposProcesados.find(t => t.name === equipoNombre);
                if (eq) {
                    eq.points += (registro.ptsBronce || 0);
                    eq.missions.push({ title: registro.titulo, place: 3, pts: registro.ptsBronce });
                }
            });

            if (registro.participantes && Array.isArray(registro.participantes)) {
                registro.participantes.forEach(participante => {
                    let eq = equiposProcesados.find(t => t.name === participante);
                    if (eq && registro.ptsParticipacion > 0) {
                        eq.points += registro.ptsParticipacion;
                        eq.missions.push({ title: registro.titulo, place: 4, pts: registro.ptsParticipacion }); 
                    }
                });
            }
        });

        // Ordenar por puntos (mayor a menor)
        equiposProcesados.sort((a, b) => b.points - a.points);
        
        // Calcular el Rank real permitiendo empates en el puntaje global
        let rankActual = 1;
        let puntosAnteriores = -1;
        equiposProcesados.forEach((equipo, index) => {
            if (equipo.points !== puntosAnteriores) { rankActual = index + 1; }
            equipo.rank = rankActual;
            puntosAnteriores = equipo.points;
        });

        globalTeamsData = equiposProcesados;
        renderizarTabla();
    };

    // --- FUNCIÓN PARA DIBUJAR LA TABLA CON IMÁGENES ---
    const renderizarTabla = () => {
        const container = document.getElementById('leaderboard-container');
        document.getElementById('loading-state').classList.add('hidden');
        container.classList.remove('hidden');
        container.innerHTML = ''; 

        if (globalTeamsData.length === 0) return;

        globalTeamsData.forEach((team) => {
            const rank = team.rank; // Utilizamos el rank calculado que soporta empates globales
            let rankColor = "text-orange-500"; 
            let suffix = "th";
            
            if (rank === 1) { rankColor = "text-yellow-400"; suffix = "st"; }
            else if (rank === 2) { rankColor = "text-gray-300"; suffix = "nd"; }
            else if (rank === 3) { rankColor = "text-amber-600"; suffix = "rd"; }

            const cacheBuster = "?v=" + new Date().getTime(); // Evitar problemas de caché
            
            const row = document.createElement('div');
            row.className = "flex items-center p-2 rounded row-hover border-b border-gray-700/50 cursor-pointer";
            row.innerHTML = `
                <div class="w-16 md:w-24 text-center font-pixel text-2xl md:text-4xl ${rankColor} rank-text italic pr-2">
                    ${rank}<span class="text-sm md:text-lg">${suffix}</span>
                </div>
                <div class="flex-1 flex items-center gap-3 md:gap-4 pl-2 md:pl-4">
                    
                    <!-- Avatar con la Imagen del Personaje -->
                    <div class="w-12 h-12 md:w-16 md:h-16 ${team.color} ${team.border} border-4 rounded-lg flex items-center justify-center shadow-[4px_4px_0_rgba(0,0,0,1)] transform -rotate-3 overflow-hidden relative">
                        <img src="${baseUrl}${team.img}${cacheBuster}" alt="${team.name}" class="w-full h-full object-contain p-1 drop-shadow-[2px_2px_2px_rgba(0,0,0,0.8)] scale-110" onerror="this.onerror=null; this.src='https://placehold.co/50x50?text=${team.name.substring(0,3)}';">
                    </div>
                    
                    <span class="font-bold text-white text-lg md:text-2xl uppercase tracking-wider drop-shadow-[2px_2px_0_rgba(0,0,0,1)]">${team.name}</span>
                </div>
                <div class="w-20 md:w-32 text-right">
                    <span class="font-pixel text-sm md:text-xl text-yellow-300 drop-shadow-[2px_2px_0_rgba(0,0,0,1)]">${team.points}</span>
                    <span class="block text-gray-400 text-[8px] md:text-[10px] uppercase font-bold mt-1">PTS</span>
                </div>
            `;

            row.addEventListener('click', () => {
                window.playCoinSound();
                window.showTeamDetails(team.name); 
            });

            container.appendChild(row);
        });
    };

    // --- MODAL DE DETALLES CON IMAGEN ---
    window.showTeamDetails = function(teamName) {
        const team = globalTeamsData.find(t => t.name === teamName);
        if (!team) return;

        const header = document.getElementById('modal-header');
        const modalImg = document.getElementById('modal-img');
        const cacheBuster = "?v=" + new Date().getTime();
        
        // Configurar Colores del Header y la Imagen
        header.className = `p-4 border-b-4 border-black flex items-center gap-4 relative ${team.color}`;
        modalImg.src = `${baseUrl}${team.img}${cacheBuster}`;
        modalImg.onerror = function() { this.src = `https://placehold.co/50x50?text=${team.name.substring(0,3)}`; };

        document.getElementById('modal-team-name').innerText = team.name;
        document.getElementById('modal-team-name').className = `font-bold text-2xl uppercase tracking-wider ${team.text || 'text-white'} drop-shadow-md`;
        document.getElementById('modal-team-points').innerText = `${team.points} PTS GLOBALES`;
        document.getElementById('modal-team-points').className = `font-pixel text-[10px] drop-shadow-md ${team.text === 'text-black' ? 'text-gray-800' : 'text-gray-100'}`;
        
        const list = document.getElementById('modal-missions-list');
        list.innerHTML = ''; 

        if (!team.missions || team.missions.length === 0) {
            list.innerHTML = '<p class="text-sm text-gray-500 text-center py-4 italic font-bold">Aún no tienen puntos registrados. ¡A jugar!</p>';
        } else {
            team.missions.sort((a,b) => b.pts - a.pts).forEach(mission => {
                let medalIcon = '🏅';
                let medalColor = 'bg-gray-200 text-gray-600 border-gray-300';
                let placeText = `${mission.place}º Lugar`;

                if (mission.place === 1) { medalIcon = '🥇'; medalColor = 'bg-yellow-100 text-yellow-700 border-yellow-400'; }
                else if (mission.place === 2) { medalIcon = '🥈'; medalColor = 'bg-gray-100 text-gray-600 border-gray-400'; }
                else if (mission.place === 3) { medalIcon = '🥉'; medalColor = 'bg-orange-100 text-orange-700 border-orange-400'; placeText = '3er Lugar'; }
                else { medalColor = 'bg-blue-50 text-blue-600 border-blue-200'; placeText = 'Participación'; }

                const li = document.createElement('li');
                li.className = `flex flex-col sm:flex-row sm:items-center justify-between p-3 rounded border-2 ${medalColor} shadow-sm gap-2`;
                li.innerHTML = `
                    <span class="font-bold text-sm md:text-base leading-tight">${mission.title}</span>
                    <div class="flex items-center justify-between sm:justify-end gap-3">
                        <div class="text-right">
                            <span class="font-pixel text-[8px] uppercase block">${placeText}</span>
                            <span class="font-bold text-xs">+${mission.pts} pts</span>
                        </div>
                        <span class="text-2xl">${medalIcon}</span>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        document.getElementById('team-modal').classList.remove('hidden');
    };

    window.closeTeamDetails = function() {
        document.getElementById('team-modal').classList.add('hidden');
    };

    document.getElementById('team-modal').addEventListener('click', (e) => {
        if (e.target.id === 'team-modal') window.closeTeamDetails();
    });

    // --- CONEXIÓN A LA NUBE (FIREBASE) ---
    const initLeaderboardCloud = async () => {
        let finalConfig = isCanvasEnv ? JSON.parse(__firebase_config) : firebaseConfig;

        if (!finalConfig || !finalConfig.apiKey || finalConfig.apiKey.includes("TU_API_KEY")) {
            console.warn("Firebase no configurado. Mostrando datos estáticos de prueba.");
            document.getElementById('offline-indicator').classList.remove('hidden');
            const localData = JSON.parse(localStorage.getItem('uatyg_comite_votos')) || [];
            procesarDatosDeNube(localData);
            return;
        }

        try {
            const app = initializeApp(finalConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            try {
                if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (authError) {
                console.error("Fallo autenticación, intentando leer datos locales:", authError);
                document.getElementById('offline-indicator').classList.remove('hidden');
                const localData = JSON.parse(localStorage.getItem('uatyg_comite_votos')) || [];
                procesarDatosDeNube(localData);
                return;
            }

            onAuthStateChanged(auth, (currentUser) => {
                if (currentUser) {
                    const comiteCollectionRef = collection(db, isCanvasEnv ? `artifacts/${currentAppId}/public/data/votos_comite` : 'votos_comite');
                    
                    onSnapshot(comiteCollectionRef, (snapshot) => {
                        const registrosNube = [];
                        snapshot.forEach((doc) => {
                            registrosNube.push({ id: doc.id, ...doc.data() });
                        });
                        
                        document.getElementById('live-indicator').classList.remove('hidden');
                        document.getElementById('offline-indicator').classList.add('hidden');
                        
                        localStorage.setItem('uatyg_comite_votos_backup', JSON.stringify(registrosNube));
                        procesarDatosDeNube(registrosNube);
                        
                    }, (error) => {
                        console.error("Error leyendo Firebase en vivo:", error);
                        document.getElementById('offline-indicator').classList.remove('hidden');
                        const backup = JSON.parse(localStorage.getItem('uatyg_comite_votos_backup')) || [];
                        procesarDatosDeNube(backup);
                    });
                }
            });
        } catch (e) {
            console.error("Error crítico iniciando Firebase Leaderboard:", e);
            document.getElementById('offline-indicator').classList.remove('hidden');
            const backup = JSON.parse(localStorage.getItem('uatyg_comite_votos_backup')) || [];
            procesarDatosDeNube(backup);
        }
    };

    initLeaderboardCloud();

</script>
</body>
</html>
