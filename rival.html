        const ITEM_POSITIONS = {
          1: [3, 8, 13], 2: [4, 9, 14], 3: [5, 10, 12], 4: [6, 11, 13],

        const MYSTERY_BOX_POOL = [
          ...Array(8).fill({ id: 'turbo', name: 'Turbo', icon: '🍄', color: 'bg-red-500', desc: 'Próximo acierto = +2 casillas.' }),
          ...Array(5).fill({ id: 'banana', name: 'Plátano', icon: '🍌', color: 'bg-yellow-500', desc: 'Congela a un rival al azar.' }),
          ...Array(4).fill({ id: 'shell', name: 'Caparazón', icon: '🐢', color: 'bg-red-600', desc: 'Ataca al 1er lugar (-1 casilla).' }),
          ...Array(2).fill({ id: 'star', name: 'Estrella', icon: '⭐', color: 'bg-yellow-300', desc: 'Inmunidad a caparazones y plátanos.' }),
          ...Array(1).fill({ id: 'lightning', name: 'Rayo', icon: '⚡', color: 'bg-blue-500', desc: '¡Todos retroceden una casilla!' }),
        ];

        const INITIAL_STATE = {
          status: 'lobby',
          currentQuestion: '',
          hostAnswerHint: '',
          deadline: 0,
          rouletteQueue: [], 
          activeRoulette: { teamId: null, spinning: false, item: null },
          winner: null,
          teams: Object.keys(TEAMS_INFO).reduce((acc, id) => ({
            ...acc,
            [id]: { pos: 0, ansText: '', connected: false, frozen: false, star: false, mushroom: false }
          }), {})
        };

        // ==========================================
        // COMPONENTE PRINCIPAL DE REACT
        // ==========================================
        function App() {
          const [user, setUser] = useState(null);
          const [db, setDb] = useState(null);
          const [gameState, setGameState] = useState(null);
          const [role, setRole] = useState(null); 
          const [myTeamId, setMyTeamId] = useState(null);
          const [firebaseLoaded, setFirebaseLoaded] = useState(false);

          // Estados Locales
          const [pinInput, setPinInput] = useState('');
          const [selectedTeam, setSelectedTeam] = useState(1);
          const [errorMsg, setErrorMsg] = useState('');
          const [timeLeft, setTimeLeft] = useState(0); 
          const [hostJudgments, setHostJudgments] = useState({}); 
          const [playerAnswerInput, setPlayerAnswerInput] = useState('');
          const [hasSubmitted, setHasSubmitted] = useState(false);

          // 1. Escuchar la carga del módulo de Firebase
          useEffect(() => {
              if (window.FirebaseAPI) {
                  setFirebaseLoaded(true);
              } else {
                  window.addEventListener('firebase-loaded', () => setFirebaseLoaded(true));
              }
          }, []);

          // 2. Inicializar Firebase con TUS CREDENCIALES
          useEffect(() => {
            if (!firebaseLoaded) return;
            try {
              const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseAPI;
              
              // TU CONFIGURACIÓN DE FIREBASE
              const firebaseConfig = {
                  apiKey: "AIzaSyAWvlKYMuFlxL88OrSOzGPzXk0w_HUTGQ8",
                  authDomain: "scuatyg2026.firebaseapp.com",
                  projectId: "scuatyg2026",
                  storageBucket: "scuatyg2026.firebasestorage.app",
                  messagingSenderId: "321639282182",
                  appId: "1:321639282182:web:6803746ad3ff4c8e8e3587"
              };
              
              const app = initializeApp(firebaseConfig);
              const auth = getAuth(app);
              setDb(getFirestore(app));

              signInAnonymously(auth).catch(e => console.error(e));
              const unsubscribe = onAuthStateChanged(auth, setUser);
              return () => unsubscribe();
            } catch (e) { console.error("Firebase init error:", e); }
          }, [firebaseLoaded]);

          // Función central para obtener la referencia del documento
          const getDocRef = () => {
            const { doc } = window.FirebaseAPI;
            // Guardamos en tu base de datos en la colección "mariokart" documento "partida_activa"
            return doc(db, 'mariokart', 'partida_activa'); 
          };

          // 3. Escuchar la Partida
          useEffect(() => {
            if (!user || !db) return;
            const { onSnapshot, setDoc } = window.FirebaseAPI;
            const docRef = getDocRef();

            const unsub = onSnapshot(docRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setGameState(data);
                
                if (role === 'player' && data.status !== 'question_active') {
                  setHasSubmitted(false);
                  setPlayerAnswerInput('');
                }
              } else if (role === 'host') {
                setDoc(docRef, INITIAL_STATE);
              }
            });

            return () => unsub();
          }, [user, db, role]);

          // 4. Lógica del Reloj
          useEffect(() => {
            if (!gameState || gameState.status !== 'question_active') {
              setTimeLeft(0);
              return;
            }
            const interval = setInterval(() => {
              const now = Date.now();
              const remaining = Math.max(0, Math.ceil((gameState.deadline - now) / 1000));
              setTimeLeft(remaining);
              if (remaining <= 0 && role === 'host') forceCloseQuestion();
            }, 500);
            return () => clearInterval(interval);
          }, [gameState?.status, gameState?.deadline, role]);

          const forceCloseQuestion = async () => {
            const { updateDoc } = window.FirebaseAPI;
            let updates = { status: 'host_evaluating' };
            Object.keys(gameState.teams).forEach(id => {
              if (!gameState.teams[id].frozen && !gameState.teams[id].ansText) {
                updates[`teams.${id}.ansText`] = 'No contestó';
              }
            });
            setHostJudgments({}); 
            await updateDoc(getDocRef(), updates);
          };

          // --- FUNCIONES DEL JUGADOR ---
          const handlePlayerJoin = async () => {
            if (pinInput.toUpperCase() === PINS.teams[selectedTeam]) {
              setMyTeamId(selectedTeam);
              setRole('player');
              if (db) await window.FirebaseAPI.updateDoc(getDocRef(), { [`teams.${selectedTeam}.connected`]: true });
            } else { setErrorMsg('PIN Incorrecto.'); }
          };

          const submitTextAnswer = async () => {
            if (!playerAnswerInput.trim() || hasSubmitted) return;
            setHasSubmitted(true);
            await window.FirebaseAPI.updateDoc(getDocRef(), { [`teams.${myTeamId}.ansText`]: playerAnswerInput.trim() });
          };

          const playerSpinRoulette = async () => {
            await window.FirebaseAPI.updateDoc(getDocRef(), { 'activeRoulette.spinning': true });
            setTimeout(async () => {
              const randomItem = MYSTERY_BOX_POOL[Math.floor(Math.random() * MYSTERY_BOX_POOL.length)];
              await window.FirebaseAPI.updateDoc(getDocRef(), {
                'activeRoulette.spinning': false,
                'activeRoulette.item': randomItem
              });
            }, 2500);
          };

          // --- FUNCIONES DEL HOST ---
          const handleHostLogin = () => {
            if (pinInput.toUpperCase() === PINS.host) {
              setRole('host');
              if(!gameState) window.FirebaseAPI.setDoc(getDocRef(), INITIAL_STATE);
            } else { setErrorMsg('PIN Incorrecto.'); }
          };

          const launchRandomQuestion = async () => {
            const randomQ = QUESTIONS_POOL[Math.floor(Math.random() * QUESTIONS_POOL.length)];
            let updates = { 
              status: 'question_active', 
              currentQuestion: randomQ.q,
              hostAnswerHint: randomQ.a,
              deadline: Date.now() + 10000 
            };
            Object.keys(gameState.teams).forEach(id => { updates[`teams.${id}.ansText`] = ''; });
            await window.FirebaseAPI.updateDoc(getDocRef(), updates);
          };

          const executeEvaluations = async () => {
            const { teams } = gameState;
            let newTeams = { ...teams };
            let newQueue = [];
            let winner = null;

            Object.keys(newTeams).forEach(id => {
              const t = newTeams[id];
              if (t.frozen) {
                t.frozen = false;
                t.ansText = '';
              } else if (hostJudgments[id] === true) {
                let steps = t.mushroom ? 2 : 1;
                t.pos = Math.min(15, t.pos + steps);
                if (t.mushroom) t.mushroom = false;
                if (ITEM_POSITIONS[id].includes(t.pos)) newQueue.push(id);
                if (t.pos === 15 && !winner) winner = id;
              } else if (hostJudgments[id] === false) {
                if (t.star) t.star = false;
              }
            });

            await window.FirebaseAPI.updateDoc(getDocRef(), {
              status: winner ? 'finished' : (newQueue.length > 0 ? 'roulette_active' : 'lobby'),
              teams: newTeams,
              rouletteQueue: newQueue,
              winner: winner
            });
          };

          const resolveItemEffect = async (teamId, item) => {
            let newTeams = { ...gameState.teams };
            const activeRivals = Object.keys(newTeams).filter(id => id !== teamId && newTeams[id].pos > 0);

            if (item.id === 'turbo') {
              newTeams[teamId].mushroom = true;
            } else if (item.id === 'star') {
              newTeams[teamId].star = true;
            } else if (item.id === 'banana') {
              if (activeRivals.length > 0) {
                const victimId = activeRivals[Math.floor(Math.random() * activeRivals.length)];
                if (newTeams[victimId].star) newTeams[victimId].star = false;
                else newTeams[victimId].frozen = true;
              }
            } else if (item.id === 'shell') {
              const maxPos = Math.max(...Object.values(newTeams).map(t => t.pos));
              const leaders = Object.keys(newTeams).filter(id => newTeams[id].pos === maxPos);
              leaders.forEach(lId => {
                if (newTeams[lId].star) newTeams[lId].star = false;
                else newTeams[lId].pos = Math.max(0, newTeams[lId].pos - 1);
              });
            } else if (item.id === 'lightning') {
              activeRivals.forEach(rId => {
                if (newTeams[rId].star) newTeams[rId].star = false;
                else newTeams[rId].pos = Math.max(0, newTeams[rId].pos - 1);
              });
            }

            const newQueue = [...gameState.rouletteQueue];
            newQueue.shift();
            await window.FirebaseAPI.updateDoc(getDocRef(), {
              teams: newTeams,
              rouletteQueue: newQueue,
              activeRoulette: { teamId: null, spinning: false, item: null },
              status: newQueue.length > 0 ? 'roulette_active' : 'lobby'
            });
          };

          const resetGame = async () => {
            if(window.confirm('¿Reiniciar tablero a cero?')) {
              await window.FirebaseAPI.setDoc(getDocRef(), INITIAL_STATE);
            }
          };

          // ==========================================
          // VISTAS CONDICIONALES
          // ==========================================
          if (!firebaseLoaded || (role && !gameState)) {
            return <div className="min-h-screen bg-gray-950 text-white flex items-center justify-center animate-pulse">Conectando a Firebase...</div>;
          }

          if (!role) {
            return (
              <div className="min-h-screen bg-gray-950 text-white flex flex-col items-center justify-center p-4">
                <h1 className="text-4xl md:text-6xl font-black mb-8 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-yellow-400 uppercase tracking-widest">
                  Dr. Mario's Brain Challenge
                </h1>
                
                <div className="grid md:grid-cols-2 gap-8 w-full max-w-4xl">
                  <div className="bg-gray-900 p-8 rounded-2xl border-2 border-gray-800 shadow-2xl">
                    <h2 className="text-xl font-bold text-yellow-400 mb-4 flex items-center justify-center gap-2"><IconSettings className="w-5 h-5"/> Admin / Proyector</h2>
                    <button onClick={() => setRole('projector')} className="w-full py-4 bg-gray-800 hover:bg-gray-700 text-white rounded-xl mb-4 border border-gray-600 font-bold">🖥️ Abrir Proyector Público</button>
                    <div className="border-t border-gray-800 pt-4">
                      <input type="password" placeholder="PIN Host" value={pinInput} onChange={e=>setPinInput(e.target.value)} className="w-full p-3 bg-gray-950 border border-gray-700 rounded mb-2 text-center tracking-widest" />
                      <button onClick={handleHostLogin} className="w-full py-3 bg-red-600 hover:bg-red-500 rounded text-white font-bold">🎮 Entrar como Juez</button>
                      {errorMsg && <p className="text-red-400 text-sm mt-2 text-center">{errorMsg}</p>}
                    </div>
                  </div>

                  <div className="bg-gray-900 p-8 rounded-2xl border-2 border-blue-900 shadow-2xl">
                    <h2 className="text-xl font-bold text-blue-400 mb-4 flex items-center justify-center gap-2"><IconUsers className="w-5 h-5"/> Modo Equipo (Karts)</h2>
                    <select value={selectedTeam} onChange={e=>setSelectedTeam(parseInt(e.target.value))} className="w-full p-4 bg-gray-950 border border-blue-800 rounded-xl mb-3 text-center text-lg font-bold">
                      {Object.values(TEAMS_INFO).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                    <input type="password" placeholder="PIN Equipo" value={pinInput} onChange={e=>setPinInput(e.target.value)} className="w-full p-4 bg-gray-950 border border-gray-700 rounded-xl text-center mb-4 uppercase tracking-widest" />
                    <button onClick={handlePlayerJoin} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl text-white font-bold text-lg">🚀 Conectar Celular</button>
                  </div>
                </div>
              </div>
            );
          }

          // --- COMPONENTE COMPARTIDO: LA PISTA VISUAL ---
          const RaceTrack = () => (
            <div className="w-full bg-gray-900 border border-gray-800 rounded-2xl p-4 shadow-2xl relative overflow-hidden flex flex-col justify-around h-full">
              <div className="absolute right-[2%] top-0 bottom-0 w-8 flex flex-col opacity-20">
                {Array.from({length: 20}).map((_, i) => <div key={i} className={`flex-1 ${i % 2 === 0 ? 'bg-white' : 'bg-black'}`}></div>)}
              </div>

              {Object.values(TEAMS_INFO).map((info) => {
                const team = gameState.teams[info.id];
                return (
                <div key={info.id} className="flex items-center gap-2 relative z-10">
                  <div className={`w-24 md:w-32 text-[10px] md:text-sm font-bold uppercase truncate px-2 py-2 rounded-lg flex flex-col justify-center border-l-4 ${team.frozen ? 'opacity-50' : ''} ${team.connected ? 'bg-gray-800' : 'bg-gray-950/50'}`} style={{ borderColor: info.hex }}>
                    <span style={{color: info.hex}}>{info.name}</span>
                    <div className="flex gap-1 h-4 mt-1 text-xs">
                      {team.mushroom && <span>🍄</span>}{team.star && <span>⭐</span>}{team.frozen && <span>🧊</span>}
                    </div>
                  </div>

                  <div className="flex-1 flex h-10 md:h-14 bg-gray-950 rounded-full border border-gray-800 overflow-hidden relative shadow-inner">
                    <div className="absolute top-0 left-0 bottom-0 opacity-20 transition-all duration-700 ease-out" style={{ width: `${(team.pos / 15) * 100}%`, backgroundColor: info.hex }}/>
                    {Array.from({ length: 15 }).map((_, stepIdx) => {
                      const stepNum = stepIdx + 1;
                      const isItem = ITEM_POSITIONS[info.id].includes(stepNum);
                      const isOccupied = team.pos === stepNum;
                      return (
                        <div key={stepNum} className={`flex-1 border-r border-gray-800/50 flex items-center justify-center relative ${isOccupied ? 'z-20' : 'z-10'}`}>
                          {isItem && !isOccupied && <div className="w-5 h-5 md:w-7 md:h-7 rounded bg-yellow-500 border-2 border-yellow-700 flex items-center justify-center animate-pulse opacity-80"><span className="text-black font-black text-[10px] md:text-xs">?</span></div>}
                          {isOccupied && <div className={`w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(0,0,0,0.8)] border-2 border-white transform scale-110 transition-transform ${team.frozen ? 'grayscale' : ''}`} style={{ backgroundColor: info.hex }}>🚗</div>}
                        </div>
                      );
                    })}
                    <div className="w-10 md:w-12 bg-yellow-400/10 flex items-center justify-center border-l border-yellow-500/30">
                      <IconStar className={`w-5 h-5 md:w-6 md:h-6 ${team.pos === 15 ? 'text-yellow-400 animate-spin' : 'text-gray-700'}`} />
                    </div>
                  </div>
                </div>
              )})}
            </div>
          );

          // ==========================================
          // VISTA 1: PROYECTOR (PANTALLA GRANDE)
          // ==========================================
          if (role === 'projector') {
            return (
              <div className="min-h-screen bg-gray-950 text-white p-4 font-sans flex flex-col relative overflow-hidden">
                <header className="text-center mb-6 mt-4">
                  <h1 className="text-4xl md:text-6xl font-black uppercase text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-yellow-400 drop-shadow-lg">Dr. Mario's Brain Challenge</h1>
                </header>

                <div className="flex-1 flex flex-col w-full max-w-7xl mx-auto z-10 gap-6">
                  
                  {gameState.status === 'lobby' && (
                    <>
                      <div className="text-center mb-4 animate-pulse"><p className="text-3xl text-gray-500 font-bold tracking-widest uppercase">Esperando siguiente pregunta...</p></div>
                      <RaceTrack />
                    </>
                  )}

                  {gameState.status === 'question_active' && (
                    <div className="flex-1 flex flex-col items-center justify-center">
                      <div className="bg-blue-900/30 border-4 border-blue-500 rounded-3xl p-16 text-center shadow-[0_0_100px_rgba(59,130,246,0.2)] w-full max-w-5xl relative">
                        <h2 className="text-5xl md:text-7xl font-black text-white mb-12 leading-tight">"{gameState.currentQuestion}"</h2>
                        <div className="flex justify-center items-center gap-6">
                          <IconTimer className="w-24 h-24 text-yellow-400 animate-pulse" />
                          <span className={`text-9xl font-black tabular-nums ${timeLeft <= 3 ? 'text-red-500 animate-bounce' : 'text-yellow-400'}`}>
                            00:{timeLeft.toString().padStart(2, '0')}
                          </span>
                        </div>
                      </div>
                    </div>
                  )}

                  {gameState.status === 'host_evaluating' && (
                    <div className="flex-1 flex flex-col h-full w-full max-w-6xl mx-auto">
                       <div className="text-center mb-8">
                         <h2 className="text-4xl font-black text-yellow-400 uppercase">¡TIEMPO AGOTADO!</h2>
                         <p className="text-xl text-gray-400 mt-2">El Juez está revisando las respuestas...</p>
                       </div>
                       
                       <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                         {Object.values(TEAMS_INFO).map(info => {
                           const t = gameState.teams[info.id];
                           return (
                             <div key={info.id} className="bg-gray-900 border-2 border-gray-700 rounded-2xl p-6 text-center shadow-xl">
                               <h3 style={{color: info.hex}} className="text-2xl font-black uppercase mb-4">{info.name}</h3>
                               {t.frozen ? (
                                 <div className="text-3xl text-blue-400 animate-pulse">🧊 Congelado</div>
                               ) : (
                                 <div className={`text-3xl font-mono font-bold break-words px-2 py-4 rounded-xl ${t.ansText === 'No contestó' ? 'text-red-400 bg-red-950/50 border border-red-900' : 'text-white bg-black border border-gray-800'}`}>
                                   {t.ansText || '...'}
                                 </div>
                               )}
                             </div>
                           )
                         })}
                       </div>
                    </div>
                  )}

                  {gameState.status === 'roulette_active' && <RaceTrack />}
                </div>

                {/* RULETA MODAL PROYECTOR */}
                {gameState.status === 'roulette_active' && gameState.activeRoulette.teamId && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/85 backdrop-blur-sm">
                    <div className="bg-gray-900 border-4 border-yellow-500 rounded-3xl p-16 text-center transform scale-110 shadow-[0_0_150px_rgba(234,179,8,0.4)] w-full max-w-2xl">
                      <h2 className="text-5xl font-black uppercase text-yellow-400 mb-4 drop-shadow-md">CAJA MISTERIOSA</h2>
                      <p className="text-3xl text-white mb-10">Turno de: <span className="font-bold" style={{color: TEAMS_INFO[gameState.activeRoulette.teamId].hex}}>{TEAMS_INFO[gameState.activeRoulette.teamId].name}</span></p>

                      {gameState.activeRoulette.spinning ? (
                        <div className="w-56 h-56 mx-auto bg-gradient-to-br from-yellow-300 to-yellow-600 rounded-3xl flex items-center justify-center animate-spin shadow-2xl border-4 border-white">
                          <span className="text-9xl text-black font-black">?</span>
                        </div>
                      ) : gameState.activeRoulette.item ? (
                        <div className="animate-bounce">
                          <div className={`w-56 h-56 mx-auto ${gameState.activeRoulette.item.color} rounded-3xl flex items-center justify-center mb-8 shadow-2xl border-4 border-white/20`}>
                            <span className="text-9xl">{gameState.activeRoulette.item.icon}</span>
                          </div>
                          <h3 className="text-5xl font-black text-white uppercase">{gameState.activeRoulette.item.name}</h3>
                          <p className="text-2xl text-gray-300 mt-4">{gameState.activeRoulette.item.desc}</p>
                        </div>
                      ) : (
                        <div className="w-56 h-56 mx-auto bg-gray-800 rounded-3xl flex flex-col items-center justify-center border-4 border-dashed border-gray-600 animate-pulse p-4">
                          <IconAlert className="w-16 h-16 text-gray-500 mb-2"/>
                          <span className="text-lg text-gray-400 font-bold">Esperando que el jugador gire la ruleta en su celular...</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* MODAL GANADOR */}
                {gameState.status === 'finished' && gameState.winner && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-xl">
                    <div className="text-center">
                      <IconTrophy className="w-64 h-64 mx-auto mb-10 animate-pulse" style={{ color: TEAMS_INFO[gameState.winner].hex }} />
                      <h2 className="text-8xl font-black uppercase mb-6 text-white drop-shadow-[0_5px_5px_rgba(0,0,0,1)]">¡GANADOR ABSOLUTO!</h2>
                      <div className="text-7xl font-black uppercase tracking-widest px-16 py-8 rounded-full border-8" style={{ backgroundColor: `${TEAMS_INFO[gameState.winner].hex}40`, borderColor: TEAMS_INFO[gameState.winner].hex, color: TEAMS_INFO[gameState.winner].hex }}>
                        {TEAMS_INFO[gameState.winner].name}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          }

          // ==========================================
          // VISTA 2: PANEL DEL HOST (JUEZ)
          // ==========================================
          if (role === 'host') {
            return (
              <div className="min-h-screen bg-gray-950 text-white p-4 max-w-3xl mx-auto flex flex-col gap-4">
                <div className="bg-gray-900 border border-gray-800 rounded-xl p-4 flex justify-between items-center shadow-lg">
                  <div>
                    <h1 className="text-xl font-black text-pink-500 uppercase">Panel de Juez</h1>
                    <p className="text-xs text-gray-400">Control maestro de la carrera</p>
                  </div>
                  <button onClick={resetGame} className="text-xs bg-red-900/50 border border-red-800 text-red-400 px-4 py-2 rounded-lg hover:bg-red-800">Reset Tablero</button>
                </div>

                {gameState.status === 'lobby' && (
                  <div className="flex-1 flex flex-col items-center justify-center p-8 bg-gray-900 border border-gray-800 rounded-xl shadow-xl">
                    <IconPlay className="w-20 h-20 text-blue-500 mb-6 opacity-50"/>
                    <h2 className="text-2xl font-bold mb-8 text-center text-gray-300">¿Listos para la siguiente ronda?</h2>
                    <button onClick={launchRandomQuestion} className="w-full py-6 bg-gradient-to-r from-blue-600 to-blue-400 hover:scale-105 active:scale-95 transition-transform text-white font-black text-2xl rounded-2xl shadow-[0_10px_20px_rgba(37,99,235,0.4)] uppercase tracking-wider">
                      Lanzar Pregunta Aleatoria
                    </button>
                    <p className="text-sm text-gray-500 mt-6">Los jugadores tendrán 10 segundos exactos para responder.</p>
                  </div>
                )}

                {gameState.status === 'question_active' && (
                  <div className="bg-gray-900 border-2 border-yellow-600 rounded-xl p-8 text-center shadow-[0_0_30px_rgba(202,138,4,0.15)] flex-1 flex flex-col justify-center">
                    <h2 className="text-2xl font-bold text-yellow-500 mb-4 uppercase tracking-widest">Tiempo Corriendo</h2>
                    <div className="text-8xl font-black tabular-nums text-white mb-8">{timeLeft}s</div>
                    <p className="text-lg text-gray-400 mb-2">Pregunta actual:</p>
                    <p className="text-2xl text-blue-300 font-bold bg-blue-900/30 p-4 rounded-xl border border-blue-800">"{gameState.currentQuestion}"</p>
                  </div>
                )}

                {gameState.status === 'host_evaluating' && (
                  <div className="bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-2xl flex-1 flex flex-col">
                     <div className="mb-6 border-b border-gray-800 pb-4">
                        <h2 className="text-2xl font-black text-blue-400 uppercase mb-2">Validar Respuestas</h2>
                        <p className="text-gray-400 text-sm">Pregunta: "{gameState.currentQuestion}"</p>
                        <p className="text-green-400 text-sm font-bold mt-1">Respuesta Oficial (Guía): {gameState.hostAnswerHint}</p>
                     </div>

                     <div className="flex-1 overflow-y-auto pr-2 flex flex-col gap-3 mb-6">
                       {Object.values(TEAMS_INFO).map(info => {
                         const t = gameState.teams[info.id];
                         const isCorrect = hostJudgments[info.id] === true;
                         const isWrong = hostJudgments[info.id] === false;
                         
                         if (t.frozen) {
                           return <div key={info.id} className="p-4 bg-gray-950 rounded-xl flex justify-between items-center text-gray-600 border border-gray-800"><span className="font-bold text-lg">{info.name}</span><span>Congelado (Pierde turno)</span></div>
                         }
                         
                         return (
                           <div key={info.id} className={`p-4 rounded-xl border-2 transition-all ${isCorrect ? 'bg-green-900/20 border-green-600 shadow-[0_0_15px_rgba(22,163,74,0.2)]' : isWrong ? 'bg-red-900/20 border-red-700' : 'bg-gray-950 border-gray-800'}`}>
                             <div className="flex justify-between items-center mb-3">
                               <span style={{color: info.hex}} className="font-black text-lg uppercase">{info.name}</span>
                               <span className={`text-xl font-mono px-3 py-1 rounded-lg ${t.ansText === 'No contestó' ? 'text-red-400 bg-red-950 border border-red-900' : 'text-white bg-black border border-gray-700'}`}>"{t.ansText}"</span>
                             </div>
                             <div className="flex gap-3">
                               <button onClick={()=>setHostJudgments({...hostJudgments, [info.id]: true})} className={`flex-1 py-3 rounded-lg font-bold text-sm flex justify-center items-center gap-2 transition-all ${isCorrect ? 'bg-green-600 text-white shadow-lg' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700'}`}><IconCheck className="w-5 h-5"/> Correcto (+1)</button>
                               <button onClick={()=>setHostJudgments({...hostJudgments, [info.id]: false})} className={`flex-1 py-3 rounded-lg font-bold text-sm flex justify-center items-center gap-2 transition-all ${isWrong ? 'bg-red-600 text-white shadow-lg' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700'}`}><IconX className="w-5 h-5"/> Incorrecto</button>
                             </div>
                           </div>
                         )
                       })}
                     </div>
                     
                     <button onClick={executeEvaluations} className="w-full py-5 bg-purple-600 hover:bg-purple-500 text-white font-black text-xl uppercase tracking-widest rounded-xl shadow-lg shadow-purple-900/50">
                       Aplicar Avances
                     </button>
                  </div>
                )}

                {gameState.status === 'roulette_active' && (
                  <div className="bg-gray-900 border-2 border-yellow-500 rounded-xl p-8 text-center flex-1 flex flex-col justify-center">
                    <h2 className="text-3xl text-yellow-400 font-black uppercase mb-4">Turno de Ruleta</h2>
                    <p className="text-xl text-white mb-8"><strong style={{color: TEAMS_INFO[gameState.activeRoulette.teamId].hex}} className="uppercase text-2xl">{TEAMS_INFO[gameState.activeRoulette.teamId].name}</strong> debe accionar la caja en su celular.</p>
                    
                    <div className="mt-8 pt-8 border-t border-gray-800">
                       <p className="text-xs text-gray-500 mb-4 uppercase">Controles de Emergencia</p>
                       {!gameState.activeRoulette.spinning && !gameState.activeRoulette.item && (
                         <button onClick={()=>window.FirebaseAPI.updateDoc(getDocRef(), {'activeRoulette.spinning': true})} className="w-full py-4 bg-gray-800 text-gray-300 font-bold rounded-xl border border-gray-700">Forzar Giro (Si el alumno no lo hace)</button>
                       )}
                       {gameState.activeRoulette.item && (
                         <button onClick={()=>resolveItemEffect(gameState.activeRoulette.teamId, gameState.activeRoulette.item)} className="w-full py-4 bg-yellow-600 text-black font-black uppercase rounded-xl shadow-lg">Forzar Aplicar Efecto</button>
                       )}
                    </div>
                  </div>
                )}
              </div>
            );
          }

          // ==========================================
          // VISTA 3: JUGADOR (CELULAR) 
          // ==========================================
          if (role === 'player') {
            const myTeam = gameState.teams[myTeamId];
            const info = TEAMS_INFO[myTeamId];
            const amIActiveRoulette = gameState.status === 'roulette_active' && gameState.activeRoulette.teamId === myTeamId;

            return (
              <div className="min-h-[100dvh] bg-gray-950 flex flex-col selection:bg-transparent overflow-hidden touch-manipulation">
                <div className={`p-4 ${info.color} flex justify-between items-center shadow-lg relative z-20`}>
                  <div className="font-black uppercase text-xl text-white drop-shadow-md">{info.name}</div>
                  <div className="flex gap-1 text-xs text-white/90 font-bold">
                     {myTeam.mushroom && <span className="bg-black/30 px-2 py-1 rounded">🍄 Turbo</span>}
                     {myTeam.star && <span className="bg-black/30 px-2 py-1 rounded">⭐ Inmune</span>}
                     {myTeam.frozen && <span className="bg-black/30 px-2 py-1 rounded">🧊 Frío</span>}
                  </div>
                </div>

                <div className="flex-1 flex flex-col p-6 bg-gray-900 items-center justify-center relative">
                  
                  {gameState.status === 'lobby' && (
                     <div className="text-center animate-pulse">
                       <IconShield className="w-20 h-20 text-gray-700 mx-auto mb-6" />
                       <h2 className="text-3xl font-black text-gray-400 uppercase">Preparando Kart...</h2>
                       <p className="text-lg text-gray-500 mt-2">Atento a la pantalla principal.</p>
                     </div>
                  )}

                  {gameState.status === 'question_active' && !myTeam.frozen && (
                    <div className="w-full max-w-md w-full text-center">
                      <div className="flex justify-center items-center gap-2 mb-6 bg-gray-950 p-3 rounded-xl border border-gray-800">
                        <IconTimer className={`w-6 h-6 ${timeLeft <= 3 ? 'text-red-500 animate-bounce' : 'text-yellow-400'}`} />
                        <span className={`text-2xl font-black tabular-nums ${timeLeft <= 3 ? 'text-red-500' : 'text-yellow-400'}`}>00:{timeLeft.toString().padStart(2, '0')}</span>
                      </div>

                      <h2 className="text-2xl md:text-3xl font-bold text-white mb-8 leading-tight">"{gameState.currentQuestion}"</h2>
                      
                      {!hasSubmitted ? (
                        <>
                          <input 
                            type="text" 
                            value={playerAnswerInput}
                            onChange={e=>setPlayerAnswerInput(e.target.value)}
                            placeholder="Escribe aquí..."
                            autoFocus
                            className="w-full p-5 bg-gray-950 border-4 border-blue-500 rounded-2xl text-center text-2xl text-white font-bold mb-6 focus:outline-none focus:border-yellow-400 shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-colors"
                          />
                          <button onClick={submitTextAnswer} className="w-full py-5 bg-blue-600 active:bg-blue-800 text-white font-black text-2xl uppercase tracking-widest rounded-2xl shadow-[0_8px_0_rgba(30,58,138,1)] active:translate-y-2 active:shadow-none transition-all">
                            ¡Enviar!
                          </button>
                        </>
                      ) : (
                        <div className="bg-green-900/30 border-2 border-green-500 p-8 rounded-3xl shadow-xl mt-4">
                          <IconCheck className="w-16 h-16 text-green-400 mx-auto mb-4 animate-bounce"/>
                          <h3 className="text-2xl font-black text-green-400 uppercase">Enviado</h3>
                          <p className="text-white text-xl font-mono mt-4 bg-black px-4 py-3 rounded-xl border border-gray-800 break-words">"{myTeam.ansText}"</p>
                        </div>
                      )}
                    </div>
                  )}

                  {gameState.status === 'question_active' && myTeam.frozen && (
                    <div className="text-center">
                      <div className="text-9xl mb-6">🧊</div>
                      <h2 className="text-4xl font-black text-blue-300 uppercase">Congelado</h2>
                      <p className="text-blue-400/80 mt-4 text-xl">Un plátano te hizo resbalar. Pierdes este turno.</p>
                    </div>
                  )}

                  {gameState.status === 'host_evaluating' && (
                     <div className="text-center">
                       <div className="w-16 h-16 border-8 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-6 shadow-lg"></div>
                       <h2 className="text-3xl font-black text-white uppercase">¡Tiempo!</h2>
                       <p className="text-xl text-gray-400 mt-4">El Juez está revisando las ortografías de todos...</p>
                     </div>
                  )}

                  {gameState.status === 'roulette_active' && (
                     <div className="w-full text-center">
                       {amIActiveRoulette ? (
                         <>
                           {!gameState.activeRoulette.spinning && !gameState.activeRoulette.item ? (
                             <div className="animate-pulse">
                                <p className="text-yellow-400 font-bold mb-4 text-xl uppercase tracking-widest">¡Es tu turno!</p>
                                <button onClick={playerSpinRoulette} className="w-full py-12 bg-gradient-to-b from-yellow-300 to-yellow-600 text-black font-black text-4xl uppercase rounded-[2rem] shadow-[0_15px_0_rgba(161,98,7,1)] active:translate-y-4 active:shadow-none transition-all border-4 border-yellow-200">
                                  GIRAR RULETA
                                </button>
                             </div>
                           ) : gameState.activeRoulette.spinning ? (
                             <h2 className="text-4xl font-black text-yellow-400 animate-pulse uppercase">Mira la pantalla gigante...</h2>
                           ) : (
                             <div className="animate-fade-in mt-4">
                               <div className={`w-40 h-40 mx-auto ${gameState.activeRoulette.item.color} rounded-3xl flex items-center justify-center mb-6 shadow-2xl border-4 border-white/20`}>
                                 <span className="text-8xl">{gameState.activeRoulette.item.icon}</span>
                               </div>
                               <h3 className="text-4xl font-black text-white mb-8 uppercase">{gameState.activeRoulette.item.name}</h3>
                               <button onClick={resolveItemEffect} className="w-full py-6 bg-green-600 active:bg-green-800 text-white font-black text-3xl uppercase rounded-2xl shadow-[0_10px_0_rgba(21,128,61,1)] active:translate-y-2 active:shadow-none transition-all">
                                 ¡Usar Ítem!
                               </button>
                             </div>
                           )}
                         </>
                       ) : (
                         <div className="text-gray-500">
                           <IconAlert className="w-20 h-20 mx-auto mb-6 opacity-30"/>
                           <p className="text-xl uppercase font-bold tracking-widest text-gray-600">Otro equipo está en la ruleta</p>
                         </div>
                       )}
                     </div>
                  )}

                  {gameState.status === 'finished' && (
                     <div className="text-center">
                       <IconTrophy className="w-32 h-32 text-yellow-500 mx-auto mb-6" />
                       <h2 className="text-4xl font-black text-white uppercase tracking-widest">¡Fin de la carrera!</h2>
                     </div>
                  )}
                </div>
              </div>
            );
          }
          return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
