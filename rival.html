    <script>
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        window.SFX = {
            init: () => { if(audioCtx.state === 'suspended') audioCtx.resume(); },
            playTone: (freq, type, duration, vol=0.1) => {
                if(audioCtx.state === 'suspended') return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            },
            tick: () => window.SFX.playTone(400, 'square', 0.05, 0.03),
            tickHigh: () => window.SFX.playTone(800, 'square', 0.05, 0.05),
            question: () => { window.SFX.playTone(440, 'square', 0.1); setTimeout(()=>window.SFX.playTone(880, 'square', 0.2), 100); },
            timeUp: () => { window.SFX.playTone(300, 'sawtooth', 0.3); setTimeout(()=>window.SFX.playTone(200, 'sawtooth', 0.5), 200); },
            correct: () => { window.SFX.playTone(987, 'square', 0.1); setTimeout(()=>window.SFX.playTone(1318, 'square', 0.3), 100); },
            spin: () => window.SFX.playTone(300 + Math.random()*400, 'sine', 0.05, 0.03),
            itemReveal: () => { window.SFX.playTone(659, 'square', 0.1); setTimeout(()=>window.SFX.playTone(880, 'square', 0.2), 100); },
            mushroom: () => { window.SFX.playTone(523, 'square', 0.1); setTimeout(()=>window.SFX.playTone(659, 'square', 0.1), 100); setTimeout(()=>window.SFX.playTone(783, 'square', 0.2), 200); },
            shell: () => { window.SFX.playTone(200, 'sawtooth', 0.1); setTimeout(()=>window.SFX.playTone(150, 'sawtooth', 0.2), 100); },
            banana: () => { window.SFX.playTone(300, 'triangle', 0.1); setTimeout(()=>window.SFX.playTone(200, 'triangle', 0.2), 100); },
            lightning: () => { window.SFX.playTone(800, 'sawtooth', 0.1, 0.2); setTimeout(()=>window.SFX.playTone(300, 'sawtooth', 0.3, 0.2), 50); },
            star: () => { window.SFX.playTone(1046, 'sine', 0.1); setTimeout(()=>window.SFX.playTone(1318, 'sine', 0.1), 100); setTimeout(()=>window.SFX.playTone(1568, 'sine', 0.3), 200); },
            win: () => {
                const notes = [523, 659, 783, 1046, 783, 1046, 1318];
                notes.forEach((n, i) => setTimeout(() => window.SFX.playTone(n, 'square', 0.2, 0.1), i * 150));
            }
        };
    </script>

                if (data.status === 'question_active' && (!prevState || prevState.status !== 'question_active')) {

            }
            
            try { await updateDoc(getDocRef(), updates); } 
            catch (e) { console.error(e); }
          };

          const handlePlayerJoin = async () => {
            window.isPlayerMode = true; 
            window.SFX.init();
            if (pinInput.toUpperCase() === PINS.teams[selectedTeam]) {
              const snap = await window.FirebaseAPI.getDoc(getDocRef());
              const currentTeams = snap.data()?.teams;
              
              if (currentTeams && currentTeams[selectedTeam]?.connected) {
                const forceJoin = window.confirm(`⚠️ El equipo ${TEAMS_INFO[selectedTeam].name} YA SE ENCUENTRA EN LÍNEA.\n\nSi te saliste por accidente y quieres recuperar tu conexión, da clic en "Aceptar".\nSi no eres de este equipo, da clic en "Cancelar".`);
                if (!forceJoin) {
                  setErrorMsg('Ese jugador ya se encuentra en línea.');
                  return;
                }
              }
              
              const sid = crypto.randomUUID();
              setMyTeamId(selectedTeam);
              setMySessionID(sid);
              setRole('player');
              
              if (db) await window.FirebaseAPI.updateDoc(getDocRef(), { 
                  [`teams.${selectedTeam}.connected`]: true,
                  [`teams.${selectedTeam}.sessionID`]: sid
              });
            } else { setErrorMsg('PIN Incorrecto.'); }
          };

          const submitTextAnswer = async (e) => {
            if (e) e.preventDefault(); 
            if (gameState.status !== 'question_active' || !playerAnswerInput.trim() || hasSubmitted || isProcessing) return;
            setIsProcessing(true);
            setHasSubmitted(true);
            try {
                await window.FirebaseAPI.updateDoc(getDocRef(), { [`teams.${myTeamId}.ansText`]: playerAnswerInput.trim() });
            } catch(e) {
                console.error(e);
                setHasSubmitted(false); 
            }
            setIsProcessing(false);
          };

          const playerSpinRoulette = async () => {
            if(isProcessing) return;
            setIsProcessing(true);
            try {
                await window.FirebaseAPI.updateDoc(getDocRef(), { 'activeRoulette.spinning': true });
                setTimeout(async () => {
                  const randomItem = MYSTERY_BOX_POOL[Math.floor(Math.random() * MYSTERY_BOX_POOL.length)];
                  await window.FirebaseAPI.updateDoc(getDocRef(), {
                    'activeRoulette.spinning': false,
                    'activeRoulette.item': randomItem
                  });
                  setIsProcessing(false);
                }, 2500);
            } catch (e) {
                console.error("Error al girar ruleta:", e);
                setIsProcessing(false);
            }
          };

          const hostForceAssignItem = async () => {
            if(isProcessing) return;
            setIsProcessing(true);
            const randomItem = MYSTERY_BOX_POOL[Math.floor(Math.random() * MYSTERY_BOX_POOL.length)];
            try {
                await window.FirebaseAPI.updateDoc(getDocRef(), {
                  'activeRoulette.spinning': false,
                  'activeRoulette.item': randomItem
                });
            } catch(e) { console.error(e); }
            setIsProcessing(false);
          };

          const hostSkipRouletteTurn = async () => {
            if(isProcessing) return;
            setIsProcessing(true);
            try {
                const newQueue = [...(gameState.rouletteQueue || [])];
                newQueue.shift(); 
                const nextInRoulette = newQueue.length > 0 ? { teamId: newQueue[0], spinning: false, item: null, targetId: null } : { teamId: null, spinning: false, item: null, targetId: null };
                await window.FirebaseAPI.updateDoc(getDocRef(), {
                  rouletteQueue: newQueue,
                  activeRoulette: nextInRoulette,
                  status: newQueue.length > 0 ? 'roulette_active' : 'lobby'
                });
            } catch(e) { console.error(e); }
            setIsProcessing(false);
          };

          const updatePunishTargetToDB = async (targetId) => {
              setPunishTarget(targetId);
              if (gameState.status === 'roulette_active') {
                  await window.FirebaseAPI.updateDoc(getDocRef(), { 'activeRoulette.targetId': targetId });
              }
          };

          const handleHostLogin = async () => {
            window.SFX.init();
            if (pinInput.toUpperCase() === 'RESET2026') {
                if(window.confirm('🚨 ¿ESTÁS SEGURO DE RESETEAR TODO EL TABLERO A CERO? Esto borrará el avance de todos los Karts.')) {
                    await window.FirebaseAPI.setDoc(getDocRef(), INITIAL_STATE);
                    setPinInput('');
                    alert('Tablero reseteado exitosamente.');
                }
                return;
            }

            if (pinInput.toUpperCase() === PINS.host) {
              setRole('host');
              if(!gameState) await window.FirebaseAPI.setDoc(getDocRef(), INITIAL_STATE);
            } else { setErrorMsg('PIN de Administrador Incorrecto.'); }
          };

          const launchRandomQuestion = async () => {
            if(isProcessing) return;
            setIsProcessing(true);

            const usedQuestionsArray = gameState.usedQuestions || [];
            const availableQs = QUESTIONS_POOL.map((q, i) => ({...q, originalIndex: i}))
                                              .filter(q => !usedQuestionsArray.includes(q.originalIndex));
            
            if (availableQs.length === 0) {
               alert("¡Se acabaron las preguntas! Reinicia el tablero para volver a jugar.");
               setIsProcessing(false);
               return;
            }

            const randomQ = availableQs[Math.floor(Math.random() * availableQs.length)];

            let updates = { 
              status: 'question_active', 
              currentQuestion: randomQ.q,
              hostAnswerHint: randomQ.a,
              questionAudio: randomQ.audio || null, 
              questionImage: randomQ.image || null, // SI TIENE IMAGEN
              deadline: Date.now() + 21000, 
              usedQuestions: [...usedQuestionsArray, randomQ.originalIndex] 
            };
            Object.keys(gameState.teams).forEach(id => { updates[`teams.${id}.ansText`] = ''; });
            await window.FirebaseAPI.updateDoc(getDocRef(), updates);
            setIsProcessing(false);
          };

          const launchAudioQuestion = async () => {
            if(isProcessing) return;
            setIsProcessing(true);

            const usedQuestionsArray = gameState.usedQuestions || [];
            const availableQs = QUESTIONS_POOL.map((q, i) => ({...q, originalIndex: i}))
                                              .filter(q => !usedQuestionsArray.includes(q.originalIndex));
            
            const audioQs = availableQs.filter(q => q.audio);
            
            if (audioQs.length === 0) {
               alert("¡Ya no hay preguntas con audio disponibles o ya se jugaron todas!");
               setIsProcessing(false);
               return;
            }

            const selectedQ = audioQs[Math.floor(Math.random() * audioQs.length)];

            let updates = { 
              status: 'question_active', 
              currentQuestion: selectedQ.q,
              hostAnswerHint: selectedQ.a,
              questionAudio: selectedQ.audio || null,
              questionImage: selectedQ.image || null,
              deadline: Date.now() + 21000, 
              usedQuestions: [...usedQuestionsArray, selectedQ.originalIndex] 
            };
            Object.keys(gameState.teams).forEach(id => { updates[`teams.${id}.ansText`] = ''; });
            await window.FirebaseAPI.updateDoc(getDocRef(), updates);
            setIsProcessing(false);
          };

          // NUEVA FUNCIÓN: LANZAR PREGUNTAS DE IMAGEN
          const launchImageQuestion = async () => {
            if(isProcessing) return;
            setIsProcessing(true);

            const usedQuestionsArray = gameState.usedQuestions || [];
            const availableQs = QUESTIONS_POOL.map((q, i) => ({...q, originalIndex: i}))
                                              .filter(q => !usedQuestionsArray.includes(q.originalIndex));
            
            const imageQs = availableQs.filter(q => q.image);
            
            if (imageQs.length === 0) {
               alert("¡Ya no hay preguntas con imagen disponibles o ya se jugaron todas!");
               setIsProcessing(false);
               return;
            }

            const selectedQ = imageQs[Math.floor(Math.random() * imageQs.length)];

            let updates = { 
              status: 'question_active', 
              currentQuestion: selectedQ.q,
              hostAnswerHint: selectedQ.a,
              questionAudio: selectedQ.audio || null,
              questionImage: selectedQ.image || null,
              deadline: Date.now() + 21000, 
              usedQuestions: [...usedQuestionsArray, selectedQ.originalIndex] 
            };
            Object.keys(gameState.teams).forEach(id => { updates[`teams.${id}.ansText`] = ''; });
            await window.FirebaseAPI.updateDoc(getDocRef(), updates);
            setIsProcessing(false);
          };

          const toggleJudgment = (teamId) => {
              const current = hostJudgments[teamId];
              setHostJudgments({ ...hostJudgments, [teamId]: !current });
          };

          const executeEvaluations = async () => {
            if(isProcessing) return;
            setIsProcessing(true);

            const { teams, tiedTeams } = gameState;
            let newTeams = { ...teams };
            let newQueue = [];
            let winner = null;
            let somebodyCorrect = false;
            let newTiedTeams = tiedTeams || [];

            if (newTiedTeams.length > 1) {
                let correctTiedTeams = [];
                newTiedTeams.forEach(id => {
                    if (hostJudgments[id] === true) {
                        correctTiedTeams.push(id);
                        somebodyCorrect = true;
                    }
                });

                if (somebodyCorrect) playSound('correct');

                if (correctTiedTeams.length === 1) {
                    winner = correctTiedTeams[0];
                } else if (correctTiedTeams.length > 1) {
                    newTiedTeams = correctTiedTeams; 
                } 

                await window.FirebaseAPI.updateDoc(getDocRef(), {
                    status: winner ? 'finished' : 'lobby',
                    winner: winner,
                    tiedTeams: newTiedTeams
                });
                setIsProcessing(false);
                return;
            }

            let potentialWinners = [];

            Object.keys(newTeams).forEach(id => {
              const t = newTeams[id];
              const isCorrect = hostJudgments[id] === true;
              t.usedItems = t.usedItems || [];

              if (t.frozen) {
                t.frozen = false;
                t.ansText = '';
              } else if (isCorrect) {
                somebodyCorrect = true;
                let steps = t.mushroom ? 2 : 1;
                t.pos = Math.min(15, t.pos + steps);
                if (t.mushroom) t.mushroom = false;
                
                if (t.pos === 15) {
                    potentialWinners.push(id);
                } else if (ITEM_POSITIONS[Number(id)] && ITEM_POSITIONS[Number(id)].includes(t.pos) && !t.usedItems.includes(t.pos)) {
                   newQueue.push(id);
                   t.usedItems.push(t.pos); 
                }
              } else {
                if (t.star) {
                  t.star = false; 
                  somebodyCorrect = true;
                  let steps = t.mushroom ? 2 : 1;
                  t.pos = Math.min(15, t.pos + steps);
                  if (t.mushroom) t.mushroom = false;
                  
                  if (t.pos === 15) {
                      potentialWinners.push(id);
                  } else if (ITEM_POSITIONS[Number(id)] && ITEM_POSITIONS[Number(id)].includes(t.pos) && !t.usedItems.includes(t.pos)) {
                     newQueue.push(id);
                     t.usedItems.push(t.pos); 
                  }
                }
              }
            });

            if (somebodyCorrect) playSound('correct');

            if (potentialWinners.length === 1) {
                winner = potentialWinners[0];
                newQueue = [];
            } else if (potentialWinners.length > 1) {
                newTiedTeams = potentialWinners;
                newQueue = [];
            }

            const nextInRoulette = newQueue.length > 0 ? { teamId: newQueue[0], spinning: false, item: null, targetId: null } : { teamId: null, spinning: false, item: null, targetId: null };

            await window.FirebaseAPI.updateDoc(getDocRef(), {
              status: winner ? 'finished' : (newTiedTeams.length > 1 ? 'lobby' : (newQueue.length > 0 ? 'roulette_active' : 'lobby')),
              teams: newTeams,
              rouletteQueue: newQueue,
              activeRoulette: nextInRoulette,
              winner: winner,
              tiedTeams: newTiedTeams
            });
            
            setIsProcessing(false);
          };

          const resolveItemEffect = async (teamId, item, targetId = null) => {
            if(isProcessing) return;
            setIsProcessing(true);

            let newTeams = { ...gameState.teams };
            const activeRivals = Object.keys(newTeams).filter(id => String(id) !== String(teamId) && newTeams[id].pos > 0);

            if (item.id === 'turbo') { playSound('mushroom'); newTeams[teamId].mushroom = true; }
            else if (item.id === 'star') { playSound('star'); newTeams[teamId].star = true; }
            else if (item.id === 'banana') { 
              playSound('banana');
              if (targetId && newTeams[targetId]) {
                 if (newTeams[targetId].star) newTeams[targetId].star = false;
                 else newTeams[targetId].frozen = true;
              } else if (activeRivals.length > 0) {
                 const victimId = activeRivals[Math.floor(Math.random() * activeRivals.length)];
                 if (newTeams[victimId].star) newTeams[victimId].star = false;
                 else newTeams[victimId].frozen = true;
              }
            } else if (item.id === 'shell') {
              playSound('shell');
              if (targetId && newTeams[targetId]) {
                 if (newTeams[targetId].star) newTeams[targetId].star = false;
                 else newTeams[targetId].pos = Math.max(0, newTeams[targetId].pos - 1);
              } else {
                 const maxPos = Math.max(...Object.values(newTeams).map(t => t.pos));
                 const leaders = Object.keys(newTeams).filter(id => newTeams[id].pos === maxPos && String(id) !== String(teamId));
                 leaders.forEach(lId => {
                    if (newTeams[lId].star) newTeams[lId].star = false;
                    else newTeams[lId].pos = Math.max(0, newTeams[lId].pos - 1);
                 });
              }
            } else if (item.id === 'lightning') {
              playSound('lightning');
              activeRivals.forEach(rId => {
                if (newTeams[rId].star) newTeams[rId].star = false;
                else newTeams[rId].pos = Math.max(0, newTeams[rId].pos - 1);
              });
            } else if (item.id === 'chaotic_lightning') {
              playSound('lightning');
              const allActive = Object.keys(newTeams).filter(id => newTeams[id].pos > 0);
              allActive.forEach(aId => {
                if (newTeams[aId].star) newTeams[aId].star = false;
                else newTeams[aId].pos = Math.max(0, newTeams[aId].pos - 1);
              });
            }

            const newQueue = [...gameState.rouletteQueue];
            newQueue.shift(); 
            const nextInRoulette = newQueue.length > 0 ? { teamId: newQueue[0], spinning: false, item: null, targetId: null } : { teamId: null, spinning: false, item: null, targetId: null };

            await window.FirebaseAPI.updateDoc(getDocRef(), {
              teams: newTeams,
              rouletteQueue: newQueue,
              activeRoulette: nextInRoulette,
              status: newQueue.length > 0 ? 'roulette_active' : 'lobby'
            });
            
            setIsProcessing(false);
          };

          const getRankings = () => {
              if (!gameState || !gameState.winner) return { first: [], second: [], third: [] };
              const scores = {};
              
              Object.keys(gameState.teams).forEach(id => {
                  if (String(id) === String(gameState.winner)) {
                      scores[id] = 1000; 
                  } else if (gameState.tiedTeams && gameState.tiedTeams.includes(String(id))) {
                      scores[id] = 999; 
                  } else {
                      scores[id] = gameState.teams[id].pos || 0; 
                  }
              });
              
              const grouped = {};
              Object.keys(scores).forEach(id => {
                  const s = scores[id];
                  if (s === 0) return; 
                  if (!grouped[s]) grouped[s] = [];
                  grouped[s].push(id);
              });
              
              const sortedScores = Object.keys(grouped).map(Number).sort((a, b) => b - a);
              return {
                  first: grouped[sortedScores[0]] || [],
                  second: grouped[sortedScores[1]] || [],
                  third: grouped[sortedScores[2]] || []
              };
          };

          if (!firebaseLoaded || (role && !gameState)) {
            return <div className="min-h-screen bg-gray-950 text-white flex items-center justify-center animate-pulse text-2xl font-bold">Conectando a UATyG Cloud...</div>;
          }

          if (!role) {
            return (
              <div className="min-h-screen bg-gray-950 text-white flex flex-col items-center justify-center p-4">
                <h1 className="text-4xl md:text-6xl font-black mb-12 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-yellow-400 uppercase tracking-widest drop-shadow-xl">
                  Dr. Mario's Brain Challenge
                </h1>
                
                <div className="grid md:grid-cols-2 gap-10 w-full max-w-5xl">
                  <div className="bg-gray-900 p-10 rounded-3xl border-2 border-yellow-700 shadow-[0_0_40px_rgba(161,98,7,0.3)]">
                    <h2 className="text-2xl font-bold text-yellow-400 mb-6 flex items-center justify-center gap-3"><IconSettings className="w-8 h-8"/> Pantalla Principal (Admin)</h2>
                    <p className="text-gray-400 text-center mb-6">Esta pantalla se conectará al proyector.</p>
                    
                    <div className="border-t border-gray-800 pt-6">
                      <input type="password" placeholder="PIN Secreto" value={pinInput} onChange={e=>setPinInput(e.target.value)} className="w-full p-4 bg-gray-950 border border-gray-700 rounded-xl mb-4 text-center tracking-widest text-xl focus:border-yellow-500 focus:outline-none" />
                      <button onClick={handleHostLogin} className="w-full py-4 bg-yellow-600 hover:bg-yellow-500 rounded-xl text-black font-black uppercase text-xl transition-all shadow-lg hover:scale-105 active:scale-95 cursor-pointer">Ingresar al Tablero</button>
                      {errorMsg && <p className="text-red-400 text-sm mt-3 text-center font-bold">{errorMsg}</p>}
                    </div>
                  </div>

                  <div className="bg-gray-900 p-10 rounded-3xl border-2 border-blue-900 shadow-[0_0_40px_rgba(30,58,138,0.3)]">
                    <h2 className="text-2xl font-bold text-blue-400 mb-6 flex items-center justify-center gap-3"><IconUsers className="w-8 h-8"/> Control de Karts</h2>
                    <p className="text-gray-400 text-center mb-6">Selecciona el equipo al que representas para responder desde tu celular.</p>

                    <select value={selectedTeam} onChange={e=>setSelectedTeam(parseInt(e.target.value))} className="w-full p-4 bg-gray-950 border border-blue-800 rounded-xl mb-4 text-center text-xl font-bold focus:border-blue-500 focus:outline-none">
                      {Object.values(TEAMS_INFO).map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                    <input type="password" placeholder="PIN de Equipo" value={pinInput} onChange={e=>setPinInput(e.target.value)} className="w-full p-4 bg-gray-950 border border-gray-700 rounded-xl text-center mb-6 uppercase tracking-widest text-xl focus:border-blue-500 focus:outline-none" />
                    <button onClick={handlePlayerJoin} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl text-white font-black uppercase text-xl transition-all shadow-lg hover:scale-105 active:scale-95 cursor-pointer">Conectar Celular</button>
                  </div>
                </div>
              </div>
            );
          }

          const RaceTrack = () => (
            <div className="w-full bg-gray-900 border border-gray-800 rounded-3xl p-6 shadow-2xl relative overflow-hidden flex flex-col justify-around h-full min-h-[400px]">
              <div className="absolute right-[2%] top-0 bottom-0 w-12 flex flex-col opacity-20">
                {Array.from({length: 20}).map((_, i) => <div key={i} className={`flex-1 ${i % 2 === 0 ? 'bg-white' : 'bg-black'}`}></div>)}
              </div>

              {Object.values(TEAMS_INFO).map((info) => {
                const team = gameState.teams[info.id];
                return (
                <div key={info.id} className="flex items-center gap-3 relative z-10 my-1">
                  <div className={`w-32 md:w-40 text-xs md:text-sm font-black uppercase truncate px-3 py-3 rounded-xl flex justify-between items-center border-l-8 ${team.frozen ? 'opacity-50' : ''} ${team.connected ? 'bg-gray-800' : 'bg-gray-950 text-gray-600'}`} style={{ borderColor: team.connected ? info.hex : '#374151' }}>
                    <div className="flex items-center gap-2">
                      <div className={`w-3 h-3 rounded-full ${team.connected ? 'bg-green-500 shadow-[0_0_8px_#22c55e] animate-pulse' : 'bg-red-900'}`}></div>
                      <span style={{color: team.connected ? info.hex : '#4b5563'}}>{info.name}</span>
                    </div>
                    <div className="flex gap-1">
                      {team.mushroom && <span title="Turbo Guardado">🍄</span>}{team.star && <span title="Estrella Activa">⭐</span>}{team.frozen && <span title="Congelado">🧊</span>}
                    </div>
                  </div>

                  <div className="flex-1 flex h-12 md:h-16 bg-gray-950 rounded-full border border-gray-800 overflow-hidden relative shadow-inner">
                    <div className="absolute top-0 left-0 bottom-0 opacity-20 transition-all duration-1000 ease-in-out" style={{ width: `${(team.pos / 15) * 100}%`, backgroundColor: info.hex }}/>
                    
                    <div className="w-12 md:w-16 border-r border-gray-800/50 flex items-center justify-center relative z-10 bg-gray-900/50">
                        {team.pos === 0 && team.connected && (
                            <div className={`w-10 h-10 md:w-14 md:h-14 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(0,0,0,0.9)] border-4 border-white transform scale-125 transition-transform ${team.frozen ? 'grayscale opacity-50' : ''}`} style={{ backgroundColor: info.hex, fontSize: '1.5rem' }}>🚗</div>
                        )}
                        {team.pos === 0 && !team.connected && (
                            <span className="text-[10px] text-red-900/50 font-bold uppercase">Off</span>
                        )}
                    </div>

                    {Array.from({ length: 15 }).map((_, stepIdx) => {
                      const stepNum = stepIdx + 1;
                      const isItem = ITEM_POSITIONS[info.id].includes(stepNum) && (!team.usedItems || !team.usedItems.includes(stepNum));
                      const isOccupied = team.pos === stepNum;
                      return (
                        <div key={stepNum} className={`flex-1 border-r border-gray-800/50 flex items-center justify-center relative ${isOccupied ? 'z-20' : 'z-10'}`}>
                          {isItem && !isOccupied && <div className="w-6 h-6 md:w-8 md:h-8 rounded-lg bg-yellow-500 border-2 border-yellow-700 flex items-center justify-center animate-pulse opacity-80"><span className="text-black font-black text-xs md:text-sm">?</span></div>}
                          {isOccupied && <div className={`w-10 h-10 md:w-14 md:h-14 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(0,0,0,0.9)] border-4 border-white transform scale-125 transition-transform ${team.frozen ? 'grayscale opacity-50' : ''}`} style={{ backgroundColor: info.hex, fontSize: '1.5rem' }}>🚗</div>}
                        </div>
                      );
                    })}
                    <div className="w-12 md:w-16 bg-yellow-400/10 flex items-center justify-center border-l-2 border-yellow-500/30">
                      <IconStar className={`w-6 h-6 md:w-8 md:h-8 ${team.pos === 15 ? 'text-yellow-400 animate-spin' : 'text-gray-700'}`} />
                    </div>
                  </div>
                </div>
              )})}
            </div>
          );

          if (role === 'projector' || role === 'host') {
            const isTieBreaker = gameState.tiedTeams && gameState.tiedTeams.length > 1;

            return (
              <div className="min-h-screen bg-gray-950 text-white p-6 font-sans flex flex-col relative overflow-hidden">
                <header className="text-center mb-6">
                  <h1 className="text-4xl md:text-6xl font-black uppercase text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-yellow-400 drop-shadow-lg tracking-widest">
                    Dr. Mario's Brain Challenge
                  </h1>
                </header>

                <div className="flex-1 flex flex-col w-full max-w-[1400px] mx-auto z-10 gap-6">
                  
                  {gameState.status === 'lobby' && (
                    <div className="flex-1 flex flex-col h-full">
                      
                      {isTieBreaker ? (
                        <div className="text-center mb-8 bg-red-900/30 border-4 border-red-600 rounded-3xl p-8">
                            <h2 className="text-5xl font-black text-red-500 uppercase tracking-widest animate-pulse mb-4">🔥 ¡DESEMPATE EN CURSO! 🔥</h2>
                            <p className="text-2xl text-white font-bold">Muerte súbita exclusiva para: {gameState.tiedTeams.map(id => TEAMS_INFO[id].name).join(', ')}</p>
                        </div>
                      ) : (
                        <div className="flex-1 mb-8"><RaceTrack /></div>
                      )}
                      
                      {role === 'host' && (
                          <div className={`border p-6 rounded-3xl shadow-2xl flex flex-col md:flex-row justify-between items-center gap-4 ${isTieBreaker ? 'bg-red-950 border-red-800' : 'bg-gray-900 border-gray-800'}`}>
                             <div>
                                <p className="text-gray-400 text-sm font-bold uppercase tracking-widest">Panel de Control Admin</p>
                                <p className="text-white text-xl">{isTieBreaker ? '¿Listos para la muerte súbita?' : '¿Listos para la carrera?'}</p>
                             </div>
                             <div className="flex flex-wrap justify-center gap-4">
                               <button disabled={isProcessing} onClick={launchImageQuestion} className={`px-6 py-4 text-white font-black text-xl uppercase rounded-2xl shadow-[0_5px_0_rgba(21,128,61,1)] flex gap-2 items-center ${isProcessing ? 'bg-gray-600 cursor-not-allowed shadow-none' : 'bg-green-600 hover:bg-green-500 active:translate-y-1 active:shadow-none transition-all cursor-pointer'}`}>
                                  <IconImage className="w-6 h-6"/> Imagen
                               </button>
                               <button disabled={isProcessing} onClick={launchAudioQuestion} className={`px-6 py-4 text-white font-black text-xl uppercase rounded-2xl shadow-[0_5px_0_rgba(161,98,7,1)] flex gap-2 items-center ${isProcessing ? 'bg-gray-600 cursor-not-allowed shadow-none' : 'bg-yellow-600 hover:bg-yellow-500 active:translate-y-1 active:shadow-none transition-all cursor-pointer'}`}>
                                  🎵 Audio
                               </button>
                               <button disabled={isProcessing} onClick={launchRandomQuestion} className={`px-6 py-4 text-white font-black text-xl uppercase rounded-2xl shadow-[0_5px_0_rgba(30,58,138,1)] flex gap-2 items-center ${isProcessing ? 'bg-gray-600 cursor-not-allowed shadow-none' : 'bg-blue-600 hover:bg-blue-500 active:translate-y-1 active:shadow-none transition-all cursor-pointer'}`}>
                                  <IconPlay className="w-6 h-6"/> Normal
                               </button>
                             </div>
                          </div>
                      )}
                      {role === 'projector' && !isTieBreaker && (
                         <div className="text-center mb-4 animate-pulse"><p className="text-3xl text-gray-500 font-bold tracking-widest uppercase">Esperando siguiente pregunta...</p></div>
                      )}
                    </div>
                  )}

                  {gameState.status === 'question_active' && (
                    <div className="flex-1 flex flex-col items-center justify-center">
                      <div className={`bg-blue-900/20 border-4 border-blue-500 rounded-[3rem] p-16 text-center shadow-[0_0_150px_rgba(59,130,246,0.3)] w-full max-w-5xl relative ${isTieBreaker ? 'border-red-500 shadow-[0_0_150px_rgba(239,68,68,0.3)]' : ''}`}>
                        {isTieBreaker && <div className="absolute -top-6 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-black px-6 py-2 rounded-full uppercase tracking-widest animate-pulse border-4 border-gray-950">🔥 MUERTE SÚBITA 🔥</div>}
                        <h2 className={`font-black text-white ${(gameState.questionAudio || gameState.questionImage) ? 'text-4xl md:text-5xl mb-8' : 'text-5xl md:text-7xl mb-16'} leading-tight`}>"{gameState.currentQuestion}"</h2>
                        
                        {/* SECCIÓN DEL REPRODUCTOR DE AUDIO */}
                        {gameState.questionAudio && (
                            <div className="mb-10 flex flex-col items-center justify-center animate-pulse">
                                <span className="text-yellow-400 font-bold tracking-widest uppercase mb-4 text-xl">🎵 Reproduciendo Audio (Máx 15s) 🎵</span>
                                <audio 
                                    src={gameState.questionAudio} 
                                    autoPlay 
                                    controls 
                                    onTimeUpdate={(e) => {
                                        if (e.target.currentTime >= 15) {
                                            e.target.pause();
                                        }
                                    }}
                                    className="w-full max-w-lg rounded-full shadow-[0_0_30px_rgba(59,130,246,0.6)] border-2 border-blue-400 opacity-90" 
                                />
                            </div>
                        )}

                        {/* SECCIÓN DE IMAGEN */}
                        {gameState.questionImage && (
                            <div className="mb-8 flex justify-center animate-fade-in">
                                <img 
                                    src={gameState.questionImage} 
                                    alt="Pregunta Visual" 
                                    className="max-h-64 md:max-h-96 rounded-2xl shadow-[0_0_40px_rgba(59,130,246,0.5)] border-4 border-blue-400 object-contain"
                                />
                            </div>
                        )}

                        <div className="flex justify-center items-center gap-8">
                          <IconTimer className="w-32 h-32 text-yellow-400 animate-pulse" />
                          <span className={`text-[10rem] font-black tabular-nums leading-none ${timeLeft <= 5 ? 'text-red-500 animate-bounce drop-shadow-[0_0_30px_rgba(239,68,68,0.8)]' : 'text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]'}`}>
                            {timeLeft}s
                          </span>
                        </div>
                      </div>
                    </div>
                  )}

                  {gameState.status === 'host_evaluating' && (
                    <div className="flex-1 flex flex-col h-full w-full">
                       <div className="text-center mb-8 relative">
                         <h2 className="text-4xl font-black text-yellow-400 uppercase tracking-widest">{isTieBreaker ? '🔥 RESULTADOS DEL DESEMPATE 🔥' : 'Respuestas Recibidas'}</h2>
                         <div className="mt-4 inline-block bg-green-900/80 border-4 border-green-500 px-10 py-4 rounded-3xl shadow-[0_0_30px_rgba(34,197,94,0.4)] transform hover:scale-105 transition-transform">
                           <p className="text-sm text-green-300 font-black uppercase tracking-widest mb-1">Respuesta Oficial</p>
                           <p className="text-5xl text-white font-black">"{gameState.hostAnswerHint}"</p>
                         </div>
                       </div>
                       
                       <div className="grid grid-cols-2 md:grid-cols-4 gap-6 flex-1">
                         {Object.values(TEAMS_INFO).filter(info => !isTieBreaker || gameState.tiedTeams.includes(String(info.id))).map(info => {
                           const t = gameState.teams[info.id];
                           const isSelected = hostJudgments[info.id];
                           const noContesto = !t.ansText || t.ansText === 'No contestó';
                           
                           return (
                             <div 
                               key={info.id} 
                               onClick={() => {
                                  if(role === 'host' && !t.frozen && !noContesto && !isProcessing && t.connected) toggleJudgment(info.id);
                               }}
                               className={`transition-all duration-300 rounded-3xl p-6 text-center border-4 flex flex-col justify-center items-center relative overflow-hidden
                                  ${t.frozen ? 'bg-blue-900/20 border-blue-900 opacity-60 cursor-not-allowed' : 
                                    !t.connected ? 'bg-gray-950 border-gray-800 opacity-50' :
                                    noContesto ? 'bg-red-950/30 border-red-900 cursor-not-allowed' :
                                    isSelected ? 'selected-answer' : 
                                    'bg-gray-900 border-gray-700 hover:border-gray-500'} ${role === 'host' && !t.frozen && !noContesto && t.connected ? 'cursor-pointer' : ''}`}
                             >
                               <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundColor: info.hex}}></div>
                               
                               {t.star && <div className="absolute top-3 left-3 flex gap-1 items-center bg-yellow-900/50 px-2 py-1 rounded-lg border border-yellow-500/50"><IconStar className="w-5 h-5 text-yellow-400" /><span className="text-yellow-400 text-xs font-bold">INMUNE</span></div>}
                               
                               <h3 style={{color: info.hex}} className="text-3xl font-black uppercase mb-4 relative z-10">{info.name}</h3>
                               
                               {t.frozen ? (
                                 <div className="text-4xl text-blue-400 font-black tracking-widest animate-pulse relative z-10">CONGELADO</div>
                               ) : !t.connected ? (
                                 <div className="text-2xl text-red-900 font-black tracking-widest relative z-10">DESCONECTADO</div>
                               ) : (
                                 <div className={`text-4xl font-mono font-bold break-words px-4 py-4 rounded-2xl w-full relative z-10 ${noContesto ? 'text-red-400' : isSelected ? 'text-green-100 bg-green-800/50' : 'text-white'}`}>
                                   {t.ansText || 'No contestó'}
                                 </div>
                               )}
                               
                               {isSelected && <IconCheck className="w-16 h-16 text-green-400 absolute top-2 right-2 opacity-30 pointer-events-none" />}
                             </div>
                           )
                         })}
                       </div>

                       {role === 'host' && (
                           <div className="mt-8 text-center">
                              <button disabled={isProcessing} onClick={executeEvaluations} className={`px-16 py-6 text-white font-black text-3xl uppercase tracking-widest rounded-[2rem] shadow-[0_8px_0_rgba(88,28,135,1)] ${isProcessing ? 'bg-gray-600 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-500 active:scale-95 transition-all cursor-pointer'}`}>
                                 ¡Aplicar y Avanzar!
                              </button>
                           </div>
                       )}
                    </div>
                  )}

                  {gameState.status === 'roulette_active' && <div className="flex-1"><RaceTrack /></div>}
                </div>

                {/* MODAL GIGANTE DE RULETA */}
                {gameState.status === 'roulette_active' && gameState.activeRoulette.teamId && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/85 backdrop-blur-sm">
                    <div className="bg-gray-900 border-4 border-yellow-500 rounded-[3rem] p-16 text-center shadow-[0_0_150px_rgba(234,179,8,0.4)] w-full max-w-4xl relative">
                      <h2 className="text-5xl md:text-6xl font-black uppercase text-yellow-400 mb-6 drop-shadow-md tracking-widest">CAJA MISTERIOSA</h2>
                      <p className="text-3xl md:text-4xl text-white mb-10">Turno de: <span className="font-bold uppercase" style={{color: TEAMS_INFO[gameState.activeRoulette.teamId].hex}}>{TEAMS_INFO[gameState.activeRoulette.teamId].name}</span></p>

                      {gameState.activeRoulette.spinning ? (
                        <div className="w-64 h-64 mx-auto bg-gradient-to-br from-yellow-300 to-yellow-600 rounded-[3rem] flex items-center justify-center animate-spin shadow-2xl border-8 border-white">
                          <span className="text-[10rem] text-black font-black leading-none pb-4">?</span>
                        </div>
                      ) : gameState.activeRoulette.item ? (
                        <div className="animate-bounce">
                          <div className={`w-64 h-64 mx-auto ${gameState.activeRoulette.item.color} rounded-[3rem] flex items-center justify-center mb-8 shadow-2xl border-8 border-white/20`}>
                            <span className="text-[8rem] md:text-[9rem]">{gameState.activeRoulette.item.icon}</span>
                          </div>
                          <h3 className="text-4xl md:text-6xl font-black text-white uppercase">{gameState.activeRoulette.item.name}</h3>
                          <p className="text-2xl md:text-3xl text-gray-300 mt-4 font-bold">{gameState.activeRoulette.item.desc}</p>
                          
                          {gameState.activeRoulette.targetId && (
                              <div className="mt-6 bg-red-600/20 border-2 border-red-500 px-6 py-3 rounded-2xl inline-block">
                                  <p className="text-xl text-red-400 font-bold uppercase tracking-widest">Apuntando a:</p>
                                  <p className="text-4xl text-white font-black uppercase" style={{ color: TEAMS_INFO[gameState.activeRoulette.targetId]?.hex }}>{TEAMS_INFO[gameState.activeRoulette.targetId]?.name}</p>
                              </div>
                          )}
                        </div>
                      ) : (
                        <div className="w-64 h-64 mx-auto bg-gray-800 rounded-[3rem] flex flex-col items-center justify-center border-8 border-dashed border-gray-600 animate-pulse p-6">
                          <IconAlert className="w-20 h-20 text-gray-500 mb-4"/>
                          <span className="text-xl text-gray-400 font-bold">Esperando a que el jugador gire la ruleta...</span>
                        </div>
                      )}

                      {/* CONTROLES DE RESCATE AVANZADOS PARA EL HOST */}
                      {role === 'host' && (
                          <div className="mt-12 p-4 bg-gray-950 rounded-2xl border border-gray-800 opacity-50 hover:opacity-100 transition-opacity">
                             <p className="text-gray-500 text-sm font-bold uppercase tracking-widest mb-3">Opciones de Rescate (Si se traba)</p>
                             <div className="flex flex-wrap justify-center gap-4">
                               {!gameState.activeRoulette.item && (
                                   <button disabled={isProcessing} onClick={hostForceAssignItem} className="px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-500">Forzar Ítem Al Azar</button>
                               )}
                               {gameState.activeRoulette.item && (
                                   <button disabled={isProcessing} onClick={()=>resolveItemEffect(gameState.activeRoulette.teamId, gameState.activeRoulette.item)} className="px-6 py-3 bg-green-600 text-white font-bold rounded-xl hover:bg-green-500">Forzar Aplicación</button>
                               )}
                               <button disabled={isProcessing} onClick={hostSkipRouletteTurn} className="px-6 py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-500">Omitir Turno Completo</button>
                             </div>
                          </div>
                      )}
                    </div>
                  </div>
                )}

                {/* MODAL GANADOR GIGANTE */}
                {gameState.status === 'finished' && gameState.winner && (() => {
                  const rankings = getRankings();
                  return (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-xl overflow-y-auto p-4">
                    <div className="text-center w-full max-w-6xl py-10">
                      <IconTrophy className="w-64 h-64 md:w-80 md:h-80 mx-auto mb-8 animate-pulse" style={{ color: TEAMS_INFO[gameState.winner].hex }} />
                      <h2 className="text-[4rem] md:text-[7rem] font-black uppercase mb-6 text-white drop-shadow-[0_10px_10px_rgba(0,0,0,1)] leading-none">¡TENEMOS GANADOR!</h2>
                      
                      <div className="text-[4rem] md:text-[6rem] font-black uppercase tracking-widest px-10 py-6 md:px-20 md:py-10 rounded-[3rem] border-8 inline-block shadow-[0_0_50px_rgba(255,255,255,0.1)]" style={{ backgroundColor: `${TEAMS_INFO[gameState.winner].hex}40`, borderColor: TEAMS_INFO[gameState.winner].hex, color: TEAMS_INFO[gameState.winner].hex }}>
                        {TEAMS_INFO[gameState.winner].name}
                      </div>

                      <div className="flex flex-col md:flex-row justify-center items-stretch gap-8 mt-12 px-4">
                          {rankings.second.length > 0 && (
                              <div className="flex-1 bg-gray-900 border-4 border-gray-400 p-8 rounded-[2rem] shadow-[0_0_30px_rgba(156,163,175,0.2)]">
                                  <h3 className="text-4xl text-gray-400 font-black uppercase mb-6 tracking-widest">2do Lugar</h3>
                                  <div className="flex flex-wrap justify-center gap-6">
                                      {rankings.second.map(id => (
                                          <span key={id} className="text-4xl font-bold uppercase" style={{ color: TEAMS_INFO[id].hex }}>{TEAMS_INFO[id].name}</span>
                                      ))}
                                  </div>
                              </div>
                          )}
                          {rankings.third.length > 0 && (
                              <div className="flex-1 bg-gray-900 border-4 border-yellow-700 p-8 rounded-[2rem] shadow-[0_0_30px_rgba(161,98,7,0.2)]">
                                  <h3 className="text-4xl text-yellow-600 font-black uppercase mb-6 tracking-widest">3er Lugar</h3>
                                  <div className="flex flex-wrap justify-center gap-6">
                                      {rankings.third.map(id => (
                                          <span key={id} className="text-4xl font-bold uppercase" style={{ color: TEAMS_INFO[id].hex }}>{TEAMS_INFO[id].name}</span>
                                      ))}
                                  </div>
                              </div>
                          )}
                      </div>

                      {role === 'host' && (
                          <div className="mt-16"><button onClick={() => window.FirebaseAPI.setDoc(getDocRef(), INITIAL_STATE)} className="text-gray-500 hover:text-white underline text-3xl font-bold cursor-pointer transition-colors">Reiniciar Carrera</button></div>
                      )}
                    </div>
                  </div>
                  );
                })()}
              </div>
            );
          }

          if (role === 'player') {
            const myTeam = gameState.teams[myTeamId];
            const info = TEAMS_INFO[myTeamId];
            const amIActiveRoulette = gameState.status === 'roulette_active' && String(gameState.activeRoulette.teamId) === String(myTeamId);

            const isTieBreaker = gameState.tiedTeams && gameState.tiedTeams.length > 1;
            const amITied = isTieBreaker && gameState.tiedTeams.includes(String(myTeamId));

            const availableRivals = Object.values(TEAMS_INFO).filter(t => String(t.id) !== String(myTeamId) && gameState.teams[t.id].pos > 0);

            if (mySessionID && gameState.teams[myTeamId].sessionID !== mySessionID) {
                return (
                  <div className="h-screen bg-black flex flex-col items-center justify-center p-10 text-center">
                    <IconAlert className="w-20 h-20 text-red-500 mb-6"/>
                    <h2 className="text-3xl font-bold text-white mb-2 uppercase">SESIÓN EXPIRADA</h2>
                    <p className="text-gray-400 mt-4 text-lg">La sesión ha cambiado, entraste desde otro dispositivo o el administrador reseteó el tablero.</p>
                    <button onClick={()=>location.reload()} className="mt-10 w-full max-w-sm px-8 py-5 bg-blue-600 text-xl rounded-xl font-black uppercase tracking-widest shadow-lg">Volver al Inicio</button>
                  </div>
                );
            }

            if (isTieBreaker && !amITied && gameState.status !== 'finished') {
               return (
                  <div className="min-h-[100dvh] bg-gray-950 flex flex-col overflow-hidden">
                    <div className={`p-4 ${info.color} flex justify-between items-center shadow-lg relative z-20 opacity-50`}>
                      <div className="font-black uppercase text-xl text-white drop-shadow-md">{info.name}</div>
                    </div>
                    <div className="flex-1 flex flex-col p-6 bg-gray-900 items-center justify-center">
                       <div className="text-center animate-pulse">
                          <span className="text-8xl mb-6 block">🔥</span>
                          <h2 className="text-4xl font-black text-red-500 uppercase tracking-widest">Muerte Súbita</h2>
                          <p className="text-xl text-gray-400 mt-4 font-bold">Has sido eliminado. Observa el desempate en la pantalla gigante.</p>
                       </div>
                    </div>
                  </div>
               );
            }

            return (
              <div className="min-h-[100dvh] bg-gray-950 flex flex-col selection:bg-transparent overflow-hidden touch-manipulation">
                <div className={`p-4 ${info.color} flex justify-between items-center shadow-lg relative z-20`}>
                  <div className="font-black uppercase text-xl text-white drop-shadow-md">{info.name}</div>
                  <div className="flex gap-1 text-xs text-white/90 font-bold">
                     {myTeam.mushroom && <span className="bg-black/30 px-2 py-1 rounded">🍄 Turbo</span>}
                     {myTeam.star && <span className="bg-black/30 px-2 py-1 rounded">⭐ Inmune</span>}
                     {myTeam.frozen && <span className="bg-black/30 px-2 py-1 rounded">🧊 Frío</span>}
                  </div>
                </div>

                <div className="flex-1 flex flex-col p-6 bg-gray-900 items-center justify-center relative overflow-y-auto">
                  
                  {gameState.status === 'lobby' && (
                     <div className="text-center animate-pulse">
                       {amITied ? <span className="text-7xl block mb-4">🔥</span> : <IconShield className="w-20 h-20 text-gray-700 mx-auto mb-6" />}
                       <h2 className={`text-3xl font-black uppercase ${amITied ? 'text-red-500' : 'text-gray-400'}`}>{amITied ? '¡DESEMPATE!' : 'Preparando Kart...'}</h2>
                       <p className="text-lg text-gray-500 mt-2">Atento a la pantalla principal.</p>
                     </div>
                  )}

                  {gameState.status === 'question_active' && !myTeam.frozen && (
                    <form onSubmit={submitTextAnswer} className="w-full max-w-md text-center">
                      {amITied && (
                          <div className="bg-red-600 text-white font-black px-6 py-2 rounded-full mb-6 inline-block animate-pulse uppercase tracking-widest border-2 border-red-400 shadow-[0_0_15px_rgba(220,38,38,0.6)]">
                            🔥 Muerte Súbita 🔥
                          </div>
                      )}
                      <div className="flex justify-center items-center gap-2 mb-6 bg-gray-950 p-3 rounded-xl border border-gray-800">
                        <IconTimer className={`w-6 h-6 ${timeLeft <= 5 ? 'text-red-500 animate-bounce' : 'text-yellow-400'}`} />
                        <span className={`text-2xl font-black tabular-nums ${timeLeft <= 5 ? 'text-red-500' : 'text-yellow-400'}`}>00:{timeLeft.toString().padStart(2, '0')}</span>
                      </div>

                      <h2 className="text-2xl md:text-3xl font-bold text-white mb-8 leading-tight">"{gameState.currentQuestion}"</h2>
                      
                      {!hasSubmitted ? (
                        <>
                          <input 
                            type="text" 
                            value={playerAnswerInput}
                            onChange={e=>setPlayerAnswerInput(e.target.value)}
                            placeholder="Escribe aquí..."
                            autoFocus
                            className="w-full p-5 bg-gray-950 border-4 border-blue-500 rounded-2xl text-center text-2xl text-white font-bold mb-6 focus:outline-none focus:border-yellow-400 shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-colors"
                          />
                          <button type="submit" disabled={isProcessing} className={`w-full py-5 text-white font-black text-2xl uppercase tracking-widest rounded-2xl shadow-[0_8px_0_rgba(30,58,138,1)] transition-all ${isProcessing ? 'bg-gray-600 cursor-not-allowed' : 'bg-blue-600 active:bg-blue-800 active:translate-y-2 active:shadow-none cursor-pointer'}`}>
                            ¡Enviar!
                          </button>
                        </>
                      ) : (
                        <div className="bg-green-900/30 border-2 border-green-500 p-8 rounded-3xl shadow-xl mt-4">
                          <IconCheck className="w-16 h-16 text-green-400 mx-auto mb-4 animate-bounce"/>
                          <h3 className="text-2xl font-black text-green-400 uppercase">Enviado</h3>
                          <p className="text-white text-xl font-mono mt-4 bg-black px-4 py-3 rounded-xl border border-gray-800 break-words">"{myTeam.ansText}"</p>
                        </div>
                      )}
                    </form>
                  )}

                  {gameState.status === 'question_active' && myTeam.frozen && (
                    <div className="text-center">
                      <div className="text-9xl mb-6">🧊</div>
                      <h2 className="text-4xl font-black text-blue-300 uppercase">Congelado</h2>
                      <p className="text-blue-400/80 mt-4 text-xl">Un plátano te hizo resbalar. Pierdes este turno.</p>
                    </div>
                  )}

                  {gameState.status === 'host_evaluating' && (
                     <div className="text-center">
                       <div className="w-16 h-16 border-8 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-6 shadow-lg"></div>
                       <h2 className="text-3xl font-black text-white uppercase">¡Tiempo!</h2>
                       <p className="text-xl text-gray-400 mt-4">Mira la pantalla gigante para los resultados...</p>
                     </div>
                  )}

                  {gameState.status === 'roulette_active' && (
                     <div className="w-full text-center">
                       {amIActiveRoulette ? (
                         <>
                           {!gameState.activeRoulette.spinning && !gameState.activeRoulette.item ? (
                             <div className="animate-pulse">
                                <p className="text-yellow-400 font-bold mb-4 text-xl uppercase tracking-widest">¡Es tu turno!</p>
                                <button disabled={isProcessing} onClick={playerSpinRoulette} className={`w-full py-12 text-black font-black text-4xl uppercase rounded-[2rem] shadow-[0_15px_0_rgba(161,98,7,1)] transition-all border-4 border-yellow-200 ${isProcessing ? 'bg-gray-600 cursor-not-allowed shadow-none' : 'bg-gradient-to-b from-yellow-300 to-yellow-600 active:translate-y-4 active:shadow-none cursor-pointer'}`}>
                                  GIRAR RULETA
                                </button>
                             </div>
                           ) : gameState.activeRoulette.spinning ? (
                             <h2 className="text-4xl font-black text-yellow-400 animate-pulse uppercase">Mira la pantalla gigante...</h2>
                           ) : (
                             <div className="animate-fade-in mt-4 flex flex-col items-center">
                               <div className={`w-32 h-32 mx-auto ${gameState.activeRoulette.item.color} rounded-3xl flex items-center justify-center mb-4 shadow-2xl border-4 border-white/20`}>
                                 <span className="text-7xl">{gameState.activeRoulette.item.icon}</span>
                               </div>
                               <h3 className="text-3xl font-black text-white mb-6 uppercase">{gameState.activeRoulette.item.name}</h3>
                               
                               {(gameState.activeRoulette.item.id === 'banana' || gameState.activeRoulette.item.id === 'shell') && availableRivals.length > 0 && (
                                  <div className="mb-6 w-full text-left bg-gray-950 p-4 rounded-2xl border border-yellow-600/50">
                                     <p className="text-yellow-400 font-bold uppercase text-sm mb-2">Selecciona a quién castigar:</p>
                                     <select value={punishTarget} onChange={e=>updatePunishTargetToDB(e.target.value)} className="w-full p-4 bg-black border border-gray-700 rounded-xl text-white font-bold text-xl focus:border-yellow-500 focus:outline-none">
                                        <option value="" disabled>-- Elige un rival --</option>
                                        {availableRivals.map(t => (
                                           <option key={t.id} value={t.id}>{t.name} (Casilla {gameState.teams[t.id].pos})</option>
                                        ))}
                                     </select>
                                  </div>
                               )}
                               
                               {(gameState.activeRoulette.item.id === 'banana' || gameState.activeRoulette.item.id === 'shell') && availableRivals.length === 0 && (
                                  <p className="text-gray-400 mb-6 font-bold">Aún no hay rivales a los qué atacar...</p>
                               )}

                               <button 
                                  disabled={isProcessing || ((gameState.activeRoulette.item.id === 'banana' || gameState.activeRoulette.item.id === 'shell') && availableRivals.length > 0 && !punishTarget)} 
                                  onClick={() => resolveItemEffect(gameState.activeRoulette.teamId, gameState.activeRoulette.item, punishTarget)} 
                                  className={`w-full py-5 text-white font-black text-2xl uppercase rounded-2xl shadow-[0_8px_0_rgba(21,128,61,1)] transition-all ${(isProcessing || ((gameState.activeRoulette.item.id === 'banana' || gameState.activeRoulette.item.id === 'shell') && availableRivals.length > 0 && !punishTarget)) ? 'bg-gray-600 cursor-not-allowed shadow-none' : 'bg-green-600 active:bg-green-800 active:translate-y-2 active:shadow-none cursor-pointer'}`}
                               >
                                 ¡Usar Ítem!
                               </button>
                             </div>
                           )}
                         </>
                       ) : (
                         <div className="text-gray-500">
                           <IconAlert className="w-20 h-20 mx-auto mb-6 opacity-30"/>
                           <p className="text-xl uppercase font-bold tracking-widest text-gray-600">Otro equipo está en la ruleta</p>
                         </div>
                       )}
                     </div>
                  )}

                  {gameState.status === 'finished' && gameState.winner && (() => {
                     const rankings = getRankings();
                     return (
                     <div className="text-center w-full max-w-sm mx-auto pb-10">
                       <IconTrophy className="w-32 h-32 text-yellow-500 mx-auto mb-6 animate-pulse" style={{ color: TEAMS_INFO[gameState.winner].hex }} />
                       <h2 className="text-4xl font-black text-white uppercase tracking-widest mb-8">¡Fin de la carrera!</h2>
                       
                       <div className="bg-gray-950 p-5 rounded-3xl mb-4 border-4 shadow-xl" style={{ borderColor: TEAMS_INFO[gameState.winner].hex }}>
                           <p className="text-xs text-gray-500 font-bold uppercase tracking-widest mb-1">1er Lugar</p>
                           <p className="text-4xl font-black uppercase" style={{ color: TEAMS_INFO[gameState.winner].hex }}>{TEAMS_INFO[gameState.winner].name}</p>
                       </div>

                       {rankings.second.length > 0 && (
                           <div className="bg-gray-900 p-4 rounded-2xl mb-4 border-2 border-gray-500">
                               <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mb-1">2do Lugar</p>
                               <p className="text-2xl font-bold uppercase text-gray-300">
                                   {rankings.second.map(id => TEAMS_INFO[id].name).join(', ')}
                               </p>
                           </div>
                       )}

                       {rankings.third.length > 0 && (
                           <div className="bg-gray-900 p-4 rounded-2xl mb-4 border-2 border-yellow-700">
                               <p className="text-xs text-yellow-700 font-bold uppercase tracking-widest mb-1">3er Lugar</p>
                               <p className="text-2xl font-bold uppercase text-yellow-600">
                                   {rankings.third.map(id => TEAMS_INFO[id].name).join(', ')}
                               </p>
                           </div>
                       )}
                     </div>
                     );
                  })()}
                </div>
              </div>
            );
          }
          return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
