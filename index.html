<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente - SC UATyG 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #5c94fc; /* Mario Sky Blue */
            background-image: 
                linear-gradient(transparent 95%, rgba(255, 255, 255, 0.2) 95%),
                linear-gradient(90deg, transparent 95%, rgba(255, 255, 255, 0.2) 95%);
            background-size: 20px 20px;
        }
        
        .font-pixel {
            font-family: 'Press Start 2P', cursive;
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .blink {
            animation: blinker 1.5s ease-in-out infinite;
        }

        @keyframes blinker {
            0%, 100% { opacity: 1; }
            /* Se cambió de 0 a 0.4 para que no desaparezca, solo baje el brillo */
            50% { opacity: 0.4; } 
        }
        
        /* Animación de la barra de carga retro */
        .loading-bar-anim {
            animation: fillBar 3s ease-in-out infinite alternate;
        }
        
        @keyframes fillBar {
            0% { width: 5%; }
            100% { width: 95%; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-x-hidden">

    <!-- Efecto de luz de fondo para resaltar el logo -->
    <div class="absolute w-64 h-64 bg-white opacity-20 rounded-full blur-3xl z-0"></div>

    <!-- Contenido Principal -->
    <div class="z-10 flex flex-col items-center text-center w-full max-w-4xl mx-auto py-8">
        
        <!-- Logo Grandotote Flotando -->
        <div class="floating mb-6 md:mb-10 relative mt-4 md:mt-0">
            <img src="https://github.com/luixney-cmyk/scuatyg2026/blob/main/mario2.png?raw=true" 
                 alt="Mario" 
                 class="w-48 sm:w-64 md:w-80 lg:w-[400px] object-contain drop-shadow-[0_15px_15px_rgba(0,0,0,0.6)]"
                 onerror="this.onerror=null; this.src='https://placehold.co/400x400?text=Mario';">
        </div>

        <!-- Texto Próximamente (Ajustado para celular) -->
        <h1 class="font-pixel text-2xl sm:text-4xl md:text-5xl lg:text-7xl text-yellow-400 drop-shadow-[3px_3px_0_rgba(0,0,0,1)] md:drop-shadow-[6px_6px_0_rgba(0,0,0,1)] mb-4 md:mb-6 blink tracking-normal md:tracking-widest leading-normal">
            PRÓXIMAMENTE
        </h1>

        <!-- Subtítulo de la Semana Cultural (Ajustado para celular) -->
        <h2 class="font-pixel text-sm sm:text-lg md:text-2xl text-white drop-shadow-[2px_2px_0_rgba(0,0,0,1)] md:drop-shadow-[3px_3px_0_rgba(0,0,0,1)] mb-4 leading-relaxed">
            SUPER SEMANA CULTURAL<br>UATyG 2026
        </h2>
        
        <p class="text-white font-bold text-lg md:text-2xl drop-shadow-md mb-8 md:mb-12">
            ¡El Reino Champiñón se está preparando!
        </p>

        <!-- Barra de carga estilo Retro -->
        <div class="w-full max-w-[260px] md:max-w-md border-4 border-black p-1 bg-white shadow-[4px_4px_0_rgba(0,0,0,0.5)] md:shadow-[6px_6px_0_rgba(0,0,0,0.5)]">
            <div class="h-4 md:h-8 bg-red-600 loading-bar-anim"></div>
        </div>
        <p class="font-pixel text-[10px] md:text-sm text-white mt-4 drop-shadow-[2px_2px_0_rgba(0,0,0,1)]">
            CARGANDO NIVEL...
        </p>

    </div>

    <!-- Logos institucionales en miniatura (UAN y CETyG) -->
    <!-- Se cambió de 'absolute bottom-4' a 'mt-8 md:mt-12' para que nunca se encimen con la barra -->
    <div class="mt-8 md:mt-12 pb-4 flex gap-4 md:gap-6 opacity-80 z-10">
        <img src="https://github.com/luixney-cmyk/scuatyg2026/blob/main/logo%20uan%20azul%20transparente%20unidad.png?raw=true" alt="UAN" class="w-10 h-10 md:w-16 md:h-16 object-contain filter drop-shadow-md">
        <img src="https://github.com/luixney-cmyk/scuatyg2026/blob/main/logo%20cetyg%20azul%20transparente.png?raw=true" alt="CETyG" class="w-10 h-10 md:w-16 md:h-16 object-contain filter drop-shadow-md">
    </div>

</body>
</html>
